<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta name="theme-color" content="#FFD700">
  <meta name="description" content="Verificação humana para acesso ao canal.">
  <title>Verificação Humana</title>

  <script src="https://telegram.org/js/telegram-web-app.js" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #FFD700;
      --primary-2: #FFE44D;
      --bg-1: #0A1628;
      --bg-2: #24104f;
      --panel: rgba(15, 24, 48, 0.9);
      --text: #FFFFFF;
      --muted: #B8C5D6;
      --line: rgba(255, 215, 0, 0.18);
      --good: #4CAF50;
      --bad: #FF6B6B;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(107, 70, 193, 0.32), transparent 35%),
        radial-gradient(circle at bottom right, rgba(255, 215, 0, 0.15), transparent 35%),
        linear-gradient(135deg, var(--bg-2), var(--bg-1));
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .shell {
      width: min(100%, 560px);
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.45);
      padding: 28px;
      backdrop-filter: blur(16px);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255, 215, 0, 0.14);
      color: var(--primary);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 18px 0 10px;
      font-size: clamp(30px, 4vw, 44px);
      line-height: 0.98;
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }

    .captcha {
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
      border-radius: 22px;
      padding: 20px;
    }

    .label {
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--primary);
      margin-bottom: 10px;
    }

    .question {
      font-size: clamp(24px, 4vw, 36px);
      font-weight: 900;
      letter-spacing: -0.03em;
      margin-bottom: 16px;
      min-height: 1.2em;
    }

    .field {
      display: grid;
      gap: 12px;
    }

    input {
      width: 100%;
      border: 1px solid rgba(255, 215, 0, 0.22);
      background: rgba(5, 12, 24, 0.7);
      color: var(--text);
      border-radius: 16px;
      padding: 16px 18px;
      font-size: 18px;
      outline: none;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(255, 215, 0, 0.12);
    }

    button {
      border: 0;
      border-radius: 16px;
      padding: 15px 18px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 30px rgba(255, 215, 0, 0.18);
    }

    button:disabled {
      opacity: 0.7;
      cursor: progress;
      transform: none;
      box-shadow: none;
    }

    .primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: #121212;
    }

    .status {
      min-height: 22px;
      margin-top: 14px;
      font-size: 14px;
      color: var(--muted);
    }

    .status.good { color: var(--good); }
    .status.bad { color: var(--bad); }

    .meta {
      margin-top: 18px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: rgba(255, 255, 255, 0.55);
      font-size: 12px;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="card">
      <span class="eyebrow">Verificação humana</span>
      <h1>Protegendo o canal</h1>
      <p class="subtitle" id="subtitle">Resolva o desafio rápido para liberar seu acesso. Se você não estiver no Telegram, abra esta página pelo Mini App.</p>

      <div class="captcha">
        <div class="label">Desafio</div>
        <div class="question" id="captchaQuestion">Carregando...</div>
        <div class="field">
          <input id="captchaAnswer" inputmode="numeric" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="Digite a resposta">
          <button class="primary" id="verifyBtn">Verificar</button>
        </div>
        <div class="status" id="status"></div>
      </div>

      <div class="meta">
        <span id="channelMeta">Canal protegido contra bots</span>
        <span id="timerMeta"></span>
      </div>
    </section>
  </main>

  <script src="verify.js"></script>
</body>
</html>

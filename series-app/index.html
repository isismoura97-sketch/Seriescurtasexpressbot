<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Séries Curtas Express</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #E50914;
      --primary-dark: #B20710;
      --dark: #141414;
      --darker: #0F0F0F;
      --gray: #808080;
      --light: #FFFFFF;
      --card-bg: #181818;
      --hover: #2F2F2F;
      --success: #4CAF50;
      --text-main: #FFFFFF;
      --text-dim: #E5E5E5;
      --bg-body: #0F0F0F;
    }
    
    body.light-mode {
      --dark: #f5f5f5;
      --darker: #ffffff;
      --card-bg: #f0f0f0;
      --hover: #e0e0e0;
      --text-main: #141414;
      --text-dim: #333333;
      --bg-body: #f5f5f5;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { background: var(--bg-body); color: var(--text-main); overflow-x: hidden; }

    /* PLAYER PROTEGIDO */
    .video-player-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.98); z-index: 10000;
      display: none; justify-content: center; align-items: center;
    }
    .video-player-overlay.active { display: flex; }
    
    .player-container {
      width: 100%; max-width: 1200px; position: relative;
      background: #000; border-radius: 12px; overflow: hidden;
    }
    
    video {
      width: 100%; height: auto; max-height: 85vh;
      display: block;
    }
    
    .player-header {
      position: absolute; top: 0; left: 0; right: 0;
      padding: 20px; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
      display: flex; justify-content: space-between; align-items: center; z-index: 10;
    }
    .player-title { font-size: 18px; font-weight: 600; }
    .player-close {
      background: rgba(255,255,255,0.1); border: none; color: white;
      width: 40px; height: 40px; border-radius: 50%; cursor: pointer;
      font-size: 20px; backdrop-filter: blur(10px);
    }
    
    .player-watermark {
      position: absolute; bottom: 80px; right: 20px;
      background: rgba(0,0,0,0.7); padding: 8px 15px; border-radius: 4px;
      font-size: 12px; color: rgba(255,255,255,0.8);
      pointer-events: none; user-select: none;
      font-family: monospace;
    }
    
    .loading-player {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%); text-align: center;
    }
    .spinner {
      width: 50px; height: 50px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--primary); border-radius: 50%;
      animation: spin 1s linear infinite; margin: 0 auto 15px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* HEADER */
    .header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      padding: 15px 4%;
      display: flex; justify-content: space-between; align-items: center;
      background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
    }
    .header.scrolled { background: var(--darker); }
    
    .logo { font-size: 22px; font-weight: 800; color: var(--primary); text-decoration: none; display: flex; align-items: center; gap: 8px; }
    .header-actions { display: flex; gap: 12px; }

    .icon-btn {
      background: rgba(128,128,128,0.2); border: none; color: var(--text-main);
      width: 40px; height: 40px; border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center; position: relative;
    }
    .icon-btn:hover { background: var(--primary); color: white; }
    
    .badge {
      position: absolute; top: -5px; right: -5px; background: var(--primary);
      color: white; font-size: 11px; font-weight: 700; width: 20px; height: 20px;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
    }

    /* CARRINHO */
    .cart-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.8);
      z-index: 9998; display: none;
    }
    .cart-overlay.active { display: block; }
    
    .cart-drawer {
      position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px; height: 100%;
      background: var(--card-bg); z-index: 9999; transition: 0.4s;
      display: flex; flex-direction: column;
    }
    .cart-drawer.active { right: 0; }
    
    .cart-header { padding: 20px; border-bottom: 1px solid rgba(128,128,128,0.2); display: flex; justify-content: space-between; }
    .cart-body { flex: 1; overflow-y: auto; padding: 20px; }
    .cart-footer { padding: 20px; border-top: 1px solid rgba(128,128,128,0.2); background: var(--darker); }
    
    .cart-item { display: flex; gap: 15px; margin-bottom: 15px; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px; }
    .cart-item img { width: 60px; height: 90px; object-fit: cover; border-radius: 6px; }
    .cart-total { display: flex; justify-content: space-between; font-size: 20px; font-weight: 800; margin-bottom: 15px; }

    /* HERO */
    .hero {
      position: relative; height: 90vh; min-height: 700px;
      display: flex; align-items: center;
      padding: 100px 0 60px 4%; background: var(--darker);
    }
    .hero-content { width: 40%; max-width: 550px; z-index: 10; position: relative; }
    .hero-image-container {
      position: absolute; right: 0; top: 50%; transform: translateY(-50%);
      width: 55%; height: 85%; display: flex; align-items: center; justify-content: center;
      padding: 30px;
    }
    .hero-poster {
      max-width: 100%; max-height: 100%; border-radius: 12px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.9);
      opacity: 0; transition: opacity 0.8s;
      object-fit: contain;
    }
    .hero-poster.active { opacity: 1; }
    
    .hero-gradient {
      position: absolute; left: 0; top: 0; bottom: 0; width: 60%; z-index: 5;
      background: linear-gradient(to right, var(--darker) 0%, rgba(15,15,15,0.95) 40%, transparent 100%);
    }

    .hero h1 { font-size: 52px; font-weight: 800; margin-bottom: 20px; line-height: 1.1; }
    .hero-desc { font-size: 18px; color: var(--text-dim); margin-bottom: 30px; }

    .btn {
      padding: 14px 28px; border-radius: 6px; border: none;
      font-size: 16px; font-weight: 700; cursor: pointer;
      display: inline-flex; align-items: center; gap: 10px;
      transition: all 0.3s;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn-primary { background: white; color: var(--dark); }
    .btn-play { background: var(--primary); color: white; margin-left: 10px; }

    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.95);
      z-index: 9997; display: none; justify-content: center; align-items: center;
      padding: 20px;
    }
    .modal-overlay.active { display: flex; }
    .modal-content {
      background: var(--card-bg); border-radius: 16px; max-width: 600px; width: 100%;
      max-height: 90vh; overflow-y: auto; position: relative;
    }
    .modal-close { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.5); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }
    .modal-img { width: 100%; height: 300px; object-fit: cover; }
    .modal-body { padding: 25px; }

    /* TOAST */
    .toast-container { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 10001; }
    .toast {
      background: rgba(30,30,30,0.95); color: white; padding: 16px 24px;
      border-radius: 12px; display: flex; align-items: center; gap: 12px;
      margin-top: 10px; transform: translateY(100px); opacity: 0;
      transition: all 0.4s;
    }
    .toast.show { transform: translateY(0); opacity: 1; }

    /* CATÁLOGO */
    .section { padding: 30px 4%; }
    .section-title { font-size: 24px; font-weight: 700; margin-bottom: 25px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
    
    .card {
      background: var(--card-bg); border-radius: 10px; overflow: hidden;
      cursor: pointer; transition: all 0.3s; position: relative; aspect-ratio: 2/3;
    }
    .card:hover { transform: scale(1.05); }
    .card img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.3s; }
    .card img.loaded { opacity: 1; }
    
    .price-tag {
      position: absolute; top: 10px; right: 10px;
      background: rgba(0,0,0,0.85); color: var(--success);
      padding: 6px 12px; border-radius: 6px; font-size: 13px; font-weight: 700; z-index: 5;
    }
    .price-tag.free { color: #FFD700; background: var(--primary); }
    
    .card-info {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 60px 15px 15px;
      background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
      opacity: 0; transition: opacity 0.3s;
    }
    .card:hover .card-info { opacity: 1; }
    .card-title { font-size: 14px; font-weight: 600; color: white; }

    /* BUSCA */
    .search-box { position: relative; max-width: 600px; margin: 0 auto 30px; }
    .search-box input {
      width: 100%; padding: 16px 24px 16px 50px;
      background: rgba(128,128,128,0.1); border: 1px solid rgba(128,128,128,0.2);
      border-radius: 12px; color: var(--text-main); font-size: 16px;
    }
    .search-box i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--gray); }

    /* CATEGORIAS */
    .categories { display: flex; gap: 12px; margin-bottom: 25px; flex-wrap: wrap; }
    .category-chip {
      padding: 10px 20px; background: rgba(128,128,128,0.1);
      border: 1px solid rgba(128,128,128,0.2); border-radius: 25px;
      color: var(--text-main); font-size: 14px; cursor: pointer;
    }
    .category-chip:hover, .category-chip.active { background: var(--primary); color: white; }

    @media (max-width: 968px) {
      .hero { flex-direction: column; height: auto; padding: 100px 4% 40px; text-align: center; }
      .hero-content { width: 100%; margin-bottom: 30px; }
      .hero-image-container { position: relative; width: 90%; height: 500px; transform: none; }
      .hero-gradient { display: none; }
      .hero h1 { font-size: 36px; }
    }
  </style>
</head>
<body>

  <!-- PLAYER PROTEGIDO -->
  <div class="video-player-overlay" id="playerOverlay">
    <div class="player-container">
      <div class="player-header">
        <div class="player-title" id="playerTitle">Carregando...</div>
        <button class="player-close" onclick="closePlayer()">
          <i class="fas fa-times"></i>
        </button>
      </div>
      
      <div class="loading-player" id="playerLoading">
        <div class="spinner"></div>
        <div>Verificando acesso...</div>
      </div>
      
      <video 
        id="mainVideo" 
        controls 
        controlsList="nodownload noremoteplayback" 
        disablePictureInPicture
        disableRemotePlayback
        style="display: none;"
      ></video>
      
      <div class="player-watermark">
        ID: <span id="watermarkId">---</span> | Protegido
      </div>
    </div>
  </div>

  <!-- CARRINHO -->
  <div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
  <div class="cart-drawer" id="cartDrawer">
    <div class="cart-header">
      <h3><i class="fas fa-shopping-cart"></i> Carrinho</h3>
      <button class="icon-btn" onclick="toggleCart()"><i class="fas fa-times"></i></button>
    </div>
    <div class="cart-body" id="cartItems"></div>
    <div class="cart-footer">
      <div class="cart-total">
        <span>Total:</span>
        <span id="cartTotal">R$ 0,00</span>
      </div>
      <button class="btn btn-primary" onclick="checkout()" style="width: 100%;">
        <i class="fas fa-check"></i> FINALIZAR
      </button>
    </div>
  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
      <img id="modalImg" class="modal-img" src="" alt="">
      <div class="modal-body">
        <h2 id="modalTitle"></h2>
        <div id="modalMeta" style="color: var(--success); font-size: 24px; font-weight: 700; margin: 15px 0;"></div>
        <p id="modalDesc" style="color: var(--text-dim); margin-bottom: 25px;"></p>
        <div style="display: flex; gap: 12px;">
          <button class="btn btn-play" onclick="addToCartFromModal()" style="flex: 1;">
            <i class="fas fa-cart-plus"></i> Carrinho
          </button>
          <button class="btn btn-primary" onclick="buyFromModal()" style="flex: 1;">
            <i class="fas fa-shopping-bag"></i> Comprar
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- TOASTS -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- HEADER -->
  <header class="header" id="header">
    <a href="#" class="logo"><i class="fas fa-play-circle"></i> SÉRIES EXPRESS</a>
    <div class="header-actions">
      <button class="icon-btn" onclick="toggleTheme()"><i class="fas fa-moon" id="themeIcon"></i></button>
      <button class="icon-btn" onclick="toggleCart()">
        <i class="fas fa-shopping-cart"></i>
        <span class="badge" id="cartBadge" style="display: none;">0</span>
      </button>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-gradient"></div>
    <div class="hero-content">
      <span style="display: inline-flex; align-items: center; gap: 6px; background: var(--primary); color: white; padding: 6px 12px; border-radius: 4px; font-size: 12px; font-weight: 700; text-transform: uppercase; margin-bottom: 15px;">
        <i class="fas fa-fire"></i> Destaque
      </span>
      <h1 id="heroTitle">Carregando...</h1>
      <p class="hero-desc" id="heroDesc">Preparando as melhores séries...</p>
      <div>
        <button class="btn btn-primary" onclick="scrollToCatalog()">
          <i class="fas fa-list"></i> Explorar
        </button>
        <button class="btn btn-play" id="heroPlayBtn" onclick="playHero()" style="display: none;">
          <i class="fas fa-play"></i> Assistir
        </button>
      </div>
    </div>
    <div class="hero-image-container">
      <img id="heroImg" class="hero-poster" alt="Poster">
    </div>
  </section>

  <!-- CATÁLOGO -->
  <section class="section" id="catalogSection">
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="Buscar séries..." onkeyup="searchSeries(this.value)">
    </div>
    
    <div class="categories">
      <div class="category-chip active" onclick="filterCategory('all', this)">Todas</div>
      <div class="category-chip" onclick="filterCategory('romance', this)">❤️ Romance</div>
      <div class="category-chip" onclick="filterCategory('drama', this)">🎭 Drama</div>
      <div class="category-chip" onclick="filterCategory('suspense', this)">🔪 Suspense</div>
    </div>

    <h2 class="section-title">Catálogo Completo</h2>
    <div class="grid" id="catalogGrid"></div>
  </section>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    
    const API_URL = 'https://uyyeascxvnrkjtlygdoe.supabase.co/functions/v1/bot-unificado';
    const userId = tg.initDataUnsafe?.user?.id || 'anonymous';
    
    let allSeries = [];
    let cart = JSON.parse(localStorage.getItem('cart_series')) || [];
    let currentHero = 0;
    let currentModalSeries = null;

    // INIT
    async function init() {
      if (localStorage.getItem('theme_series') === 'light') toggleTheme();
      await loadSeries();
      window.addEventListener('scroll', () => {
        document.getElementById('header').classList.toggle('scrolled', window.scrollY > 50);
      });
    }

    // CARREGAR SÉRIES
    async function loadSeries() {
      try {
        const res = await fetch(`${API_URL}/api/series`);
        allSeries = await res.json();
        renderGrid(allSeries);
        startHero();
        updateCartUI();
      } catch (e) {
        console.error('Erro:', e);
      }
    }

    // HERO
    function startHero() {
      if (!allSeries.length) return;
      updateHero(0);
      setInterval(() => {
        currentHero = (currentHero + 1) % allSeries.length;
        updateHero(currentHero);
      }, 6000);
    }

    function updateHero(index) {
      const serie = allSeries[index];
      document.getElementById('heroTitle').textContent = serie.title;
      document.getElementById('heroDesc').textContent = serie.description || 'Uma história emocionante...';
      const img = document.getElementById('heroImg');
      img.classList.remove('active');
      setTimeout(() => {
        img.src = serie.cover_url;
        img.onload = () => img.classList.add('active');
      }, 300);
      document.getElementById('heroPlayBtn').style.display = 'inline-flex';
    }

    function playHero() {
      openPlayer(allSeries[currentHero].id, allSeries[currentHero].title);
    }

    // PLAYER
    async function openPlayer(serieId, title) {
      const overlay = document.getElementById('playerOverlay');
      const loading = document.getElementById('playerLoading');
      const video = document.getElementById('mainVideo');
      
      overlay.classList.add('active');
      loading.style.display = 'block';
      video.style.display = 'none';
      document.getElementById('playerTitle').textContent = title;
      document.getElementById('watermarkId').textContent = userId;
      
      try {
        const res = await fetch(`${API_URL}/api/stream/${serieId}?user_id=${userId}`);
        const data = await res.json();
        
        if (data.error) {
          showToast(data.error, 'error');
          closePlayer();
          return;
        }
        
        if (data.type === 'telegram') {
          showToast('Redirecionando para Telegram...', 'info');
          tg.sendData(JSON.stringify({ action: 'request_video', series_id: serieId }));
          setTimeout(() => { closePlayer(); tg.close(); }, 1000);
          return;
        }
        
        video.src = data.url;
        video.load();
        loading.style.display = 'none';
        video.style.display = 'block';
        video.play().catch(e => console.log('Autoplay bloqueado'));
        
        setTimeout(() => {
          if (overlay.classList.contains('active')) {
            showToast('Sessão expirada', 'error');
            closePlayer();
          }
        }, 1800000);
        
      } catch (e) {
        showToast('Erro ao carregar vídeo', 'error');
        closePlayer();
      }
    }

    function closePlayer() {
      const video = document.getElementById('mainVideo');
      video.pause();
      video.src = '';
      document.getElementById('playerOverlay').classList.remove('active');
    }

    // CARRINHO
    function toggleCart() {
      document.getElementById('cartOverlay').classList.toggle('active');
      document.getElementById('cartDrawer').classList.toggle('active');
    }

    function addToCart(serie) {
      if (cart.find(item => item.id === serie.id)) {
        showToast('Já está no carrinho', 'error');
        return;
      }
      cart.push(serie);
      localStorage.setItem('cart_series', JSON.stringify(cart));
      updateCartUI();
      showToast('Adicionado!', 'success');
    }

    function removeFromCart(id) {
      cart = cart.filter(item => item.id !== id);
      localStorage.setItem('cart_series', JSON.stringify(cart));
      updateCartUI();
    }

    function updateCartUI() {
      const container = document.getElementById('cartItems');
      const badge = document.getElementById('cartBadge');
      const totalEl = document.getElementById('cartTotal');
      
      badge.textContent = cart.length;
      badge.style.display = cart.length > 0 ? 'flex' : 'none';
      
      let total = 0;
      
      if (cart.length === 0) {
        container.innerHTML = '<p style="text-align: center; color: gray; padding: 40px;">Carrinho vazio</p>';
      } else {
        container.innerHTML = cart.map(item => {
          total += parseFloat(item.price);
          return `
            <div class="cart-item">
              <img src="${item.cover_url}" alt="${item.title}">
              <div style="flex: 1;">
                <div style="font-weight: 600; margin-bottom: 5px;">${item.title}</div>
                <div style="color: #4CAF50;">${item.price == 0 ? 'GRÁTIS' : 'R$ ' + item.price}</div>
              </div>
              <button onclick="removeFromCart('${item.id}')" style="background: none; border: none; color: #ff4444; cursor: pointer;">
                <i class="fas fa-trash"></i>
              </button>
            </div>
          `;
        }).join('');
      }
      
      totalEl.textContent = total === 0 ? 'Grátis' : 'R$ ' + total.toFixed(2);
    }

    function addToCartFromModal() {
      if (currentModalSeries) {
        addToCart(currentModalSeries);
        closeModal();
      }
    }

    function checkout() {
      if (cart.length === 0) return;
      
      tg.sendData(JSON.stringify({
        action: 'checkout_cart',
        items: cart,
        total: cart.reduce((sum, item) => sum + parseFloat(item.price), 0)
      }));
      
      showToast('Finalizando...', 'success');
      setTimeout(() => {
        cart = [];
        localStorage.setItem('cart_series', JSON.stringify(cart));
        updateCartUI();
        toggleCart();
        tg.close();
      }, 1000);
    }

    // MODAL
    function openModal(serie) {
      currentModalSeries = serie;
      document.getElementById('modalImg').src = serie.cover_url;
      document.getElementById('modalTitle').textContent = serie.title;
      document.getElementById('modalDesc').textContent = serie.description || '';
      document.getElementById('modalMeta').textContent = serie.price == 0 ? 'GRÁTIS' : 'R$ ' + serie.price;
      document.getElementById('modalMeta').className = serie.price == 0 ? 'free' : '';
      document.getElementById('modalOverlay').classList.add('active');
    }

    function closeModal(e) {
      if (!e || e.target.id === 'modalOverlay') {
        document.getElementById('modalOverlay').classList.remove('active');
      }
    }

    function buyFromModal() {
      if (currentModalSeries) {
        tg.sendData(JSON.stringify({
          action: 'buy',
          series_id: currentModalSeries.id,
          title: currentModalSeries.title,
          price: currentModalSeries.price
        }));
        tg.close();
      }
    }

    // GRID
    function renderGrid(series) {
      const grid = document.getElementById('catalogGrid');
      grid.innerHTML = series.map(s => `
        <div class="card" onclick='openModal(${JSON.stringify(s).replace(/'/g, "&#39;")})'>
          <span class="price-tag ${s.price == 0 ? 'free' : ''}">
            ${s.price == 0 ? 'GRÁTIS' : 'R$ ' + s.price}
          </span>
          <img src="${s.cover_url}" alt="${s.title}" loading="lazy" onload="this.classList.add('loaded')">
          <div class="card-info">
            <div class="card-title">${s.title}</div>
          </div>
        </div>
      `).join('');
    }

    function filterCategory(cat, el) {
      document.querySelectorAll('.category-chip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      renderGrid(cat === 'all' ? allSeries : allSeries.filter(s => s.category === cat));
    }

    function searchSeries(term) {
      renderGrid(term ? allSeries.filter(s => s.title.toLowerCase().includes(term.toLowerCase())) : allSeries);
    }

    function scrollToCatalog() {
      document.getElementById('catalogSection').scrollIntoView({ behavior: 'smooth' });
    }

    function toggleTheme() {
      const isLight = document.body.classList.toggle('light-mode');
      document.getElementById('themeIcon').className = isLight ? 'fas fa-sun' : 'fas fa-moon';
      localStorage.setItem('theme_series', isLight ? 'light' : 'dark');
    }

    function showToast(message, type = 'info') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = 'toast';
      const colors = { success: '#4CAF50', error: '#f44336', info: '#2196F3' };
      toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check' : type === 'error' ? 'exclamation' : 'info'}-circle" style="color: ${colors[type]};"></i><span>${message}</span>`;
      container.appendChild(toast);
      setTimeout(() => toast.classList.add('show'), 10);
      setTimeout(() => { toast.remove(); }, 3000);
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') { closePlayer(); closeModal(); }
    });

    init();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Séries Curtas Express</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #E50914;
      --primary-dark: #B20710;
      --dark: #141414;
      --darker: #0F0F0F;
      --gray: #808080;
      --light: #FFFFFF;
      --card-bg: #181818;
      --hover: #2F2F2F;
    }
    
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    
    body {
      background: var(--darker);
      color: var(--light);
      overflow-x: hidden;
    }
    
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      padding: 15px 4%;
      background: linear-gradient(to bottom, rgba(0,0,0,0.9) 10%, transparent);
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.3s;
    }
    
    .header.scrolled {
      background: var(--darker);
      box-shadow: 0 2px 20px rgba(0,0,0,0.5);
    }
    
    .logo {
      font-size: 24px;
      font-weight: 800;
      color: var(--primary);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    /* HERO COM ALTA QUALIDADE */
    .hero {
      position: relative;
      height: 85vh; /* Aumentado para melhor visualização */
      min-height: 600px;
      background: var(--darker);
      display: flex;
      align-items: flex-end;
      padding: 0 4% 80px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    
    .hero-bg {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 0;
      opacity: 0;
      transition: opacity 1s ease-in-out;
      /* CONFIGURAÇÃO DE ALTA QUALIDADE */
      background-size: cover; /* Mantém proporção cobrindo toda área */
      background-position: center center; /* Centraliza */
      background-repeat: no-repeat;
      /* Otimizações de renderização */
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
      -webkit-transform: translateZ(0);
      transform: translateZ(0);
      will-change: opacity;
      /* Evita pixelização */
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
    }
    
    .hero-bg.active {
      opacity: 1;
    }
    
    /* Gradiente sobre a imagem para legibilidade do texto */
    .hero-bg::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(
        to bottom, 
        rgba(0,0,0,0.2) 0%, 
        rgba(0,0,0,0) 30%,
        rgba(20,20,20,0.4) 70%,
        var(--darker) 100%
      );
    }
    
    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 650px;
      animation: fadeInUp 0.8s ease;
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(229, 9, 20, 0.9);
      color: var(--light);
      padding: 8px 16px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 20px;
      letter-spacing: 1px;
      box-shadow: 0 4px 15px rgba(229, 9, 20, 0.3);
    }
    
    .hero h1 {
      font-size: 48px;
      font-weight: 800;
      margin-bottom: 16px;
      line-height: 1.1;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
      letter-spacing: -0.5px;
    }
    
    .hero-desc {
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 30px;
      color: #e5e5e5;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
      max-width: 550px;
    }
    
    .btn {
      padding: 14px 28px;
      border-radius: 6px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }
    
    .btn-primary {
      background: var(--light);
      color: var(--dark);
    }
    
    .btn-primary:hover {
      background: #e5e5e5;
    }
    
    .btn-secondary {
      background: rgba(255,255,255,0.2);
      color: var(--light);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.3);
    }
    
    .btn-secondary:hover {
      background: rgba(255,255,255,0.3);
    }
    
    /* Controles do slideshow */
    .hero-controls {
      position: absolute;
      right: 4%;
      bottom: 120px;
      z-index: 10;
      display: flex;
      gap: 12px;
    }
    
    .hero-nav {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.5);
      color: white;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    
    .hero-nav:hover {
      background: rgba(255,255,255,0.3);
      transform: scale(1.1);
      border-color: var(--primary);
    }
    
    .hero-dots {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 10;
    }
    
    .hero-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      cursor: pointer;
      transition: all 0.3s;
      border: 2px solid transparent;
    }
    
    .hero-dot:hover {
      background: rgba(255,255,255,0.6);
    }
    
    .hero-dot.active {
      background: var(--primary);
      width: 30px;
      border-radius: 5px;
      border-color: rgba(255,255,255,0.5);
    }
    
    .section {
      padding: 20px 4%;
      margin-bottom: 30px;
    }
    
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    
    .section-title {
      font-size: 22px;
      font-weight: 700;
    }
    
    .movies-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 18px;
    }
    
    .movie-card {
      position: relative;
      background: var(--card-bg);
      border-radius: 8px;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      aspect-ratio: 2/3;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
    
    .movie-card:hover {
      transform: scale(1.05) translateY(-5px);
      z-index: 10;
      box-shadow: 0 15px 35px rgba(0,0,0,0.6);
    }
    
    .movie-bg {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    
    .movie-bg i {
      font-size: 48px;
      color: rgba(255,255,255,0.1);
    }
    
    .movie-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.3s;
      /* ALTA QUALIDADE NAS MINIATURAS */
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
    }
    
    .movie-image.loaded {
      opacity: 1;
    }
    
    .price-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.85);
      color: #4CAF50;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      backdrop-filter: blur(10px);
      z-index: 5;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    
    .price-badge.free {
      color: #FFD700;
      background: rgba(229, 9, 20, 0.9);
    }
    
    .movie-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 60px 15px 15px;
      background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 50%, transparent 100%);
      opacity: 0;
      transition: opacity 0.3s;
    }
    
    .movie-card:hover .movie-info {
      opacity: 1;
    }
    
    .movie-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 6px;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    .movie-price {
      font-size: 14px;
      color: #4CAF50;
      font-weight: 700;
    }
    
    .categories-scroll {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding: 10px 0;
      scrollbar-width: none;
    }
    
    .categories-scroll::-webkit-scrollbar {
      display: none;
    }
    
    .category-chip {
      padding: 10px 20px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 25px;
      color: var(--light);
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.3s;
      font-weight: 500;
    }
    
    .category-chip:hover, .category-chip.active {
      background: var(--light);
      color: var(--dark);
      font-weight: 600;
      transform: scale(1.05);
    }
    
    .search-container {
      padding: 0 4%;
      margin-bottom: 25px;
    }
    
    .search-box {
      position: relative;
      max-width: 600px;
      margin: 0 auto;
    }
    
    .search-box input {
      width: 100%;
      padding: 16px 24px 16px 50px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      color: var(--light);
      font-size: 16px;
      outline: none;
      transition: all 0.3s;
    }
    
    .search-box input:focus {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.3);
    }
    
    .search-box i {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray);
      font-size: 18px;
    }
    
    @media (max-width: 768px) {
      .hero { 
        height: 75vh; 
        min-height: 500px;
        padding: 0 4% 60px;
      }
      .hero h1 { font-size: 32px; }
      .hero-desc { font-size: 16px; }
      .hero-controls { display: none; }
      .movies-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
    }
  </style>
</head>
<body>
  <header class="header" id="header">
    <a href="#" class="logo">
      <i class="fas fa-play-circle"></i>
      SÉRIES CURTAS
    </a>
  </header>

  <section class="hero" id="hero-section">
    <div class="hero-bg" id="hero-bg"></div>
    <div class="hero-content">
      <span class="hero-badge">
        <i class="fas fa-fire"></i>
        Destaque da Semana
      </span>
      <h1 id="hero-title">Carregando...</h1>
      <p class="hero-desc" id="hero-desc">
        As melhores séries curtas estão aqui. Compre e assista instantaneamente!
      </p>
      <div style="display: flex; gap: 12px;">
        <button class="btn btn-primary" onclick="buyFeatured()">
          <i class="fas fa-play"></i>
          Comprar Agora
        </button>
        <button class="btn btn-secondary" onclick="scrollToGrid()">
          <i class="fas fa-list"></i>
          Ver Catálogo
        </button>
      </div>
    </div>
    
    <!-- Controles de navegação -->
    <div class="hero-controls">
      <button onclick="prevHero()" class="hero-nav"><i class="fas fa-chevron-left"></i></button>
      <button onclick="nextHero()" class="hero-nav"><i class="fas fa-chevron-right"></i></button>
    </div>
    
    <!-- Indicadores -->
    <div class="hero-dots" id="hero-dots"></div>
  </section>

  <div class="search-container">
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="Buscar séries..." onkeyup="searchSeries(this.value)">
    </div>
  </div>

  <div class="section">
    <div class="categories-scroll">
      <div class="category-chip active" onclick="filterCategory('all')">Todas</div>
      <div class="category-chip" onclick="filterCategory('romance')">❤️ Romance</div>
      <div class="category-chip" onclick="filterCategory('drama')">🎭 Drama</div>
      <div class="category-chip" onclick="filterCategory('suspense')">🔪 Suspense</div>
    </div>
  </div>

  <section class="section" id="grid-section">
    <div class="section-header">
      <h2 class="section-title">Catálogo Completo</h2>
    </div>
    <div class="movies-grid" id="movies-grid"></div>
  </section>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    
    const API_URL = 'https://uyyeascxvnrkjtlygdoe.supabase.co/functions/v1/bot-unificado/api/series';
    let allSeries = [];
    let featuredSeries = null;
    let currentHeroIndex = 0;
    let heroInterval;
    let preloadedImages = {};
    
    // Placeholders por categoria (fallback apenas)
    const placeholderImages = {
      romance: 'https://images.unsplash.com/photo-1518621736915-f3b1c41bfd00?w=1920&q=90',
      drama: 'https://images.unsplash.com/photo-1485846234645-a62644f84728?w=1920&q=90',
      suspense: 'https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=1920&q=90',
      comedia: 'https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?w=1920&q=90',
      default: 'https://images.unsplash.com/photo-1440404653325-ab127d49abc1?w=1920&q=90'
    };
    
    // Scroll do header
    window.addEventListener('scroll', () => {
      const header = document.getElementById('header');
      if (window.scrollY > 50) header.classList.add('scrolled');
      else header.classList.remove('scrolled');
    });
    
    // PRÉ-CARREGAMENTO EM ALTA QUALIDADE
    function preloadImage(url) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(url);
        img.onerror = reject;
        img.src = url;
      });
    }
    
    async function preloadAllImages(series) {
      const promises = series.map(async (s) => {
        if (s.cover_url) {
          try {
            await preloadImage(s.cover_url);
            preloadedImages[s.id] = s.cover_url;
          } catch (e) {
            console.log('Erro ao pré-carregar:', s.title);
          }
        }
      });
      await Promise.all(promises);
    }
    
    // SLIDESHOW COM ALTA QUALIDADE
    async function updateHeroBackground() {
      const heroBg = document.getElementById('hero-bg');
      const heroTitle = document.getElementById('hero-title');
      const heroDesc = document.getElementById('hero-desc');
      
      if (!allSeries.length || !heroBg) return;
      
      const serie = allSeries[currentHeroIndex];
      
      // Usa a imagem original do bucket em alta qualidade
      const imageUrl = serie.cover_url || placeholderImages[serie.category] || placeholderImages.default;
      
      // Aguarda a imagem carregar antes de mostrar (evita "piscar" em baixa qualidade)
      try {
        await preloadImage(imageUrl);
      } catch (e) {
        console.log('Usando imagem do cache ou fallback');
      }
      
      // Transição suave
      heroBg.style.opacity = '0';
      
      setTimeout(() => {
        heroBg.style.backgroundImage = `url('${imageUrl}')`;
        heroBg.classList.add('active');
        heroBg.style.opacity = '1';
      }, 300);
      
      // Atualiza texto com animação
      heroTitle.style.opacity = '0';
      heroDesc.style.opacity = '0';
      
      setTimeout(() => {
        heroTitle.textContent = serie.title;
        heroDesc.textContent = serie.description || 'Uma história emocionante que vai prender você do início ao fim.';
        heroTitle.style.opacity = '1';
        heroDesc.style.opacity = '1';
        heroTitle.style.transition = 'opacity 0.5s ease';
        heroDesc.style.transition = 'opacity 0.5s ease';
      }, 400);
      
      featuredSeries = serie;
      updateHeroDots();
    }
    
    function updateHeroDots() {
      const dotsContainer = document.getElementById('hero-dots');
      if (!dotsContainer || !allSeries.length) return;
      
      dotsContainer.innerHTML = allSeries.map((_, index) => 
        `<div class="hero-dot ${index === currentHeroIndex ? 'active' : ''}" onclick="goToHero(${index})"></div>`
      ).join('');
    }
    
    function startHeroSlideshow() {
      if (heroInterval) clearInterval(heroInterval);
      updateHeroBackground();
      
      // Troca a cada 8 segundos para dar tempo de apreciar a imagem em alta qualidade
      heroInterval = setInterval(() => {
        nextHero();
      }, 8000);
    }
    
    function nextHero() {
      currentHeroIndex = (currentHeroIndex + 1) % allSeries.length;
      updateHeroBackground();
    }
    
    function prevHero() {
      currentHeroIndex = (currentHeroIndex - 1 + allSeries.length) % allSeries.length;
      updateHeroBackground();
      resetTimer();
    }
    
    function goToHero(index) {
      currentHeroIndex = index;
      updateHeroBackground();
      resetTimer();
    }
    
    function resetTimer() {
      if (heroInterval) {
        clearInterval(heroInterval);
        heroInterval = setInterval(nextHero, 8000);
      }
    }
    
    // CARREGAR DADOS
    async function loadSeries() {
      try {
        const res = await fetch(API_URL);
        if (!res.ok) throw new Error('Erro na API');
        
        allSeries = await res.json();
        
        // Pré-carrega todas as imagens em alta qualidade
        await preloadAllImages(allSeries);
        
        // Inicia o slideshow
        startHeroSlideshow();
        renderGrid(allSeries);
        
      } catch (e) {
        console.error('Erro:', e);
        document.getElementById('movies-grid').innerHTML = 
          '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #666;">' +
          '<i class="fas fa-exclamation-circle" style="font-size: 48px; margin-bottom: 15px;"></i>' +
          '<p>Erro ao carregar séries. Tente recarregar.</p></div>';
      }
    }
    
    function renderGrid(series) {
      const grid = document.getElementById('movies-grid');
      if (!series || series.length === 0) {
        grid.innerHTML = '<p style="color: #666; text-align: center; grid-column: 1/-1;">Nenhuma série encontrada</p>';
        return;
      }
      
      grid.innerHTML = series.map((s, index) => {
        const isFree = s.price == 0;
        const priceText = isFree ? 'GRÁTIS' : `R$ ${s.price}`;
        const priceClass = isFree ? 'free' : '';
        
        // Usa a imagem do bucket em alta qualidade
        const imgUrl = s.cover_url || placeholderImages[s.category] || placeholderImages.default;
        
        return `
          <div class="movie-card" onclick="buy('${s.id}', '${s.title.replace(/'/g, "\\'")}', ${s.price})">
            <div class="movie-bg">
              <i class="fas fa-film"></i>
              <img src="${imgUrl}" 
                   class="movie-image" 
                   alt="${s.title}"
                   loading="lazy"
                   onload="this.classList.add('loaded')"
                   onerror="this.style.display='none'">
            </div>
            <span class="price-badge ${priceClass}">${priceText}</span>
            <div class="movie-info">
              <h3 class="movie-title">${s.title}</h3>
              <div class="movie-price ${priceClass}">${priceText}</div>
            </div>
          </div>
        `;
      }).join('');
    }
    
    function filterCategory(cat) {
      document.querySelectorAll('.category-chip').forEach(chip => chip.classList.remove('active'));
      event.target.classList.add('active');
      
      if (cat === 'all') renderGrid(allSeries);
      else {
        const filtered = allSeries.filter(s => s.category === cat || s.title.toLowerCase().includes(cat));
        renderGrid(filtered);
      }
    }
    
    function searchSeries(term) {
      if (!term) {
        renderGrid(allSeries);
        return;
      }
      
      const filtered = allSeries.filter(s => 
        s.title.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '')
          .includes(term.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, ''))
      );
      renderGrid(filtered);
    }
    
    function buy(id, title, price) {
      tg.sendData(JSON.stringify({ action: 'buy', series_id: id, title, price }));
      tg.close();
    }
    
    function buyFeatured() {
      if (featuredSeries) buy(featuredSeries.id, featuredSeries.title, featuredSeries.price);
    }
    
    function scrollToGrid() {
      document.getElementById('grid-section').scrollIntoView({ behavior: 'smooth' });
    }
    
    // Inicia a aplicação
    loadSeries();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Séries Curtas Express</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #E50914;
      --primary-dark: #B20710;
      --dark: #141414;
      --darker: #0F0F0F;
      --gray: #808080;
      --light: #FFFFFF;
      --card-bg: #181818;
      --hover: #2F2F2F;
    }
    
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    
    body {
      background: var(--darker);
      color: var(--light);
      overflow-x: hidden;
    }
    
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      padding: 15px 4%;
      background: linear-gradient(to bottom, rgba(0,0,0,0.9) 10%, transparent);
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.3s;
    }
    
    .header.scrolled {
      background: var(--darker);
      box-shadow: 0 2px 20px rgba(0,0,0,0.5);
    }
    
    .logo {
      font-size: 24px;
      font-weight: 800;
      color: var(--primary);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .hero {
      position: relative;
      height: 70vh;
      min-height: 500px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.3), var(--darker)),
                  url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=1920&q=80') center/cover;
      display: flex;
      align-items: flex-end;
      padding: 0 4% 60px;
      margin-bottom: 20px;
    }
    
    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 600px;
    }
    
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(229, 9, 20, 0.2);
      color: var(--primary);
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 15px;
      border: 1px solid rgba(229, 9, 20, 0.3);
    }
    
    .hero h1 {
      font-size: 42px;
      font-weight: 800;
      margin-bottom: 15px;
      line-height: 1.1;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
    }
    
    .hero-desc {
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 25px;
      color: #ddd;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    .btn {
      padding: 12px 24px;
      border-radius: 4px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: var(--light);
      color: var(--dark);
    }
    
    .btn-secondary {
      background: rgba(255,255,255,0.2);
      color: var(--light);
      backdrop-filter: blur(10px);
    }
    
    .section {
      padding: 20px 4%;
      margin-bottom: 30px;
    }
    
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    
    .section-title {
      font-size: 20px;
      font-weight: 600;
    }
    
    .movies-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 15px;
    }
    
    .movie-card {
      position: relative;
      background: var(--card-bg);
      border-radius: 8px;
      overflow: hidden;
      transition: all 0.3s;
      cursor: pointer;
      aspect-ratio: 2/3;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
    
    .movie-card:hover {
      transform: scale(1.08);
      z-index: 10;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }
    
    .movie-bg {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    
    .movie-bg i {
      font-size: 48px;
      color: rgba(255,255,255,0.1);
    }
    
    .movie-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.3s;
    }
    
    .movie-image.loaded {
      opacity: 1;
    }
    
    .price-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0,0,0,0.8);
      color: #4CAF50;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 700;
      backdrop-filter: blur(10px);
      z-index: 5;
    }
    
    .price-badge.free {
      color: #FFD700;
      background: rgba(229, 9, 20, 0.9);
    }
    
    .movie-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 50px 12px 12px;
      background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }
    
    .movie-card:hover .movie-info {
      opacity: 1;
    }
    
    .movie-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 5px;
      line-height: 1.2;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    .movie-price {
      font-size: 13px;
      color: #4CAF50;
      font-weight: 700;
    }
    
    .categories-scroll {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 10px 0;
      scrollbar-width: none;
    }
    
    .categories-scroll::-webkit-scrollbar {
      display: none;
    }
    
    .category-chip {
      padding: 8px 16px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      color: var(--light);
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.3s;
    }
    
    .category-chip:hover, .category-chip.active {
      background: var(--light);
      color: var(--dark);
      font-weight: 600;
    }
    
    .search-container {
      padding: 0 4%;
      margin-bottom: 20px;
    }
    
    .search-box {
      position: relative;
      max-width: 600px;
      margin: 0 auto;
    }
    
    .search-box input {
      width: 100%;
      padding: 15px 20px 15px 45px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      color: var(--light);
      font-size: 16px;
      outline: none;
    }
    
    .search-box i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray);
    }
    
    @media (max-width: 768px) {
      .hero h1 { font-size: 28px; }
      .movies-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
    }
  </style>
</head>
<body>
  <header class="header" id="header">
    <a href="#" class="logo">
      <i class="fas fa-play-circle"></i>
      SÉRIES CURTAS
    </a>
  </header>

  <section class="hero">
    <div class="hero-content">
      <span class="hero-badge">
        <i class="fas fa-fire"></i>
        Destaque da Semana
      </span>
      <h1 id="hero-title">Carregando...</h1>
      <p class="hero-desc" id="hero-desc">
        As melhores séries curtas estão aqui. Compre e assista instantaneamente!
      </p>
      <div style="display: flex; gap: 12px;">
        <button class="btn btn-primary" onclick="buyFeatured()">
          <i class="fas fa-play"></i>
          Comprar Agora
        </button>
        <button class="btn btn-secondary" onclick="scrollToGrid()">
          <i class="fas fa-list"></i>
          Ver Catálogo
        </button>
      </div>
    </div>
  </section>

  <div class="search-container">
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="Buscar séries..." onkeyup="searchSeries(this.value)">
    </div>
  </div>

  <div class="section">
    <div class="categories-scroll">
      <div class="category-chip active" onclick="filterCategory('all')">Todas</div>
      <div class="category-chip" onclick="filterCategory('romance')">❤️ Romance</div>
      <div class="category-chip" onclick="filterCategory('drama')">🎭 Drama</div>
      <div class="category-chip" onclick="filterCategory('suspense')">🔪 Suspense</div>
    </div>
  </div>

  <section class="section" id="grid-section">
    <div class="section-header">
      <h2 class="section-title">Catálogo Completo</h2>
    </div>
    <div class="movies-grid" id="movies-grid">
      <!-- Cards serão inseridos aqui -->
    </div>
  </section>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    
    const API_URL = 'https://uyyeascxvnrkjtlygdoe.supabase.co/functions/v1/bot-unificado/api/series';
    let allSeries = [];
    let featuredSeries = null;
    
    // Imagens placeholder por categoria
    const placeholderImages = {
      romance: 'https://images.unsplash.com/photo-1518621736915-f3b1c41bfd00?w=400&q=80',
      drama: 'https://images.unsplash.com/photo-1485846234645-a62644f84728?w=400&q=80',
      suspense: 'https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=400&q=80',
      comedia: 'https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?w=400&q=80',
      default: 'https://images.unsplash.com/photo-1440404653325-ab127d49abc1?w=400&q=80'
    };
    
    window.addEventListener('scroll', () => {
      const header = document.getElementById('header');
      if (window.scrollY > 50) header.classList.add('scrolled');
      else header.classList.remove('scrolled');
    });
    
    async function loadSeries() {
      try {
        const res = await fetch(API_URL);
        if (!res.ok) throw new Error('Erro na API');
        
        allSeries = await res.json();
        
        // Definir destaque
        featuredSeries = allSeries.find(s => s.price > 0) || allSeries[0];
        if (featuredSeries) {
          document.getElementById('hero-title').textContent = featuredSeries.title;
          document.getElementById('hero-desc').textContent = featuredSeries.description || 'Uma história emocionante que vai prender você do início ao fim.';
        }
        
        renderGrid(allSeries);
        
      } catch (e) {
        console.error('Erro:', e);
        document.getElementById('movies-grid').innerHTML = 
          '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #666;">' +
          '<i class="fas fa-exclamation-circle" style="font-size: 48px; margin-bottom: 15px;"></i>' +
          '<p>Erro ao carregar séries. Tente recarregar.</p></div>';
      }
    }
    
    function getPlaceholderImage(category) {
      return placeholderImages[category] || placeholderImages.default;
    }
    
    function renderGrid(series) {
      const grid = document.getElementById('movies-grid');
      if (!series || series.length === 0) {
        grid.innerHTML = '<p style="color: #666; text-align: center; grid-column: 1/-1;">Nenhuma série encontrada</p>';
        return;
      }
      
      grid.innerHTML = series.map((s, index) => {
        const isFree = s.price == 0;
        const priceText = isFree ? 'GRÁTIS' : `R$ ${s.price}`;
        const priceClass = isFree ? 'free' : '';
        
        // Usar imagem placeholder baseada na categoria ou índice
        const imgUrl = s.cover_url || getPlaceholderImage(s.category) + '&random=' + index;
        
        return `
          <div class="movie-card" onclick="buy('${s.id}', '${s.title.replace(/'/g, "\\'")}', ${s.price})">
            <div class="movie-bg">
              <i class="fas fa-film"></i>
              <img src="${imgUrl}" 
                   class="movie-image" 
                   alt="${s.title}"
                   onload="this.classList.add('loaded')"
                   onerror="this.style.display='none'">
            </div>
            <span class="price-badge ${priceClass}">${priceText}</span>
            <div class="movie-info">
              <h3 class="movie-title">${s.title}</h3>
              <div class="movie-price ${priceClass}">${priceText}</div>
            </div>
          </div>
        `;
      }).join('');
    }
    
    function filterCategory(cat) {
      document.querySelectorAll('.category-chip').forEach(chip => chip.classList.remove('active'));
      event.target.classList.add('active');
      
      if (cat === 'all') renderGrid(allSeries);
      else {
        const filtered = allSeries.filter(s => s.category === cat || s.title.toLowerCase().includes(cat));
        renderGrid(filtered);
      }
    }
    
    function searchSeries(term) {
      if (!term) {
        renderGrid(allSeries);
        return;
      }
      
      const filtered = allSeries.filter(s => 
        s.title.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '')
          .includes(term.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, ''))
      );
      renderGrid(filtered);
    }
    
    function buy(id, title, price) {
      tg.sendData(JSON.stringify({ action: 'buy', series_id: id, title, price }));
      tg.close();
    }
    
    function buyFeatured() {
      if (featuredSeries) buy(featuredSeries.id, featuredSeries.title, featuredSeries.price);
    }
    
    function scrollToGrid() {
      document.getElementById('grid-section').scrollIntoView({ behavior: 'smooth' });
    }
    
    loadSeries();
  </script>
</body>
</html>

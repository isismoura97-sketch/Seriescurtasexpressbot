<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Séries Curtas Express</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #E50914;
      --primary-dark: #B20710;
      --dark: #141414;
      --darker: #0F0F0F;
      --gray: #808080;
      --light: #FFFFFF;
      --card-bg: #181818;
      --hover: #2F2F2F;
    }
    
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    
    body {
      background: var(--darker);
      color: var(--light);
      overflow-x: hidden;
    }
    
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      padding: 15px 4%;
      background: linear-gradient(to bottom, rgba(0,0,0,0.9) 10%, transparent);
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.3s;
    }
    
    .header.scrolled {
      background: var(--darker);
      box-shadow: 0 2px 20px rgba(0,0,0,0.5);
    }
    
    .logo {
      font-size: 24px;
      font-weight: 800;
      color: var(--primary);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    /* Layout dividido: Texto esquerda, Imagem direita */
    .hero {
      position: relative;
      height: 85vh;
      min-height: 600px;
      background: var(--darker);
      display: flex;
      align-items: center;
      padding: 80px 0 60px 4%;
      margin-bottom: 20px;
      overflow: hidden;
    }
    
    /* Conteúdo textual à esquerda */
    .hero-content {
      position: relative;
      z-index: 10;
      width: 40%;
      max-width: 550px;
      padding-right: 60px;
      animation: fadeInLeft 0.8s ease;
    }
    
    @keyframes fadeInLeft {
      from {
        opacity: 0;
        transform: translateX(-30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
    
    /* Container da imagem à direita - estilo cartaz cinema */
    .hero-image-container {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 55%;
      height: 90%;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    /* Imagem como cartaz de cinema - SEM ZOOM */
    .hero-image {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain; /* Mantém proporção sem cortar */
      object-position: center center;
      transition: opacity 0.8s ease-in-out;
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
      opacity: 0;
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    }
    
    .hero-image.active {
      opacity: 1;
    }
    
    /* Gradiente suave para integrar texto e imagem */
    .hero-gradient {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 55%;
      background: linear-gradient(to right, 
        var(--darker) 0%, 
        rgba(15,15,15,0.98) 25%,
        rgba(15,15,15,0.85) 45%,
        rgba(15,15,15,0.4) 60%,
        transparent 100%
      );
      z-index: 5;
      pointer-events: none;
    }
    
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(229, 9, 20, 0.9);
      color: var(--light);
      padding: 8px 16px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 20px;
      letter-spacing: 1px;
      box-shadow: 0 4px 15px rgba(229, 9, 20, 0.3);
    }
    
    .hero h1 {
      font-size: 48px;
      font-weight: 800;
      margin-bottom: 20px;
      line-height: 1.1;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
      letter-spacing: -0.5px;
    }
    
    .hero-desc {
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 30px;
      color: #e5e5e5;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
    }
    
    .btn {
      padding: 14px 28px;
      border-radius: 6px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }
    
    .btn-primary {
      background: var(--light);
      color: var(--dark);
    }
    
    .btn-secondary {
      background: rgba(255,255,255,0.2);
      color: var(--light);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.3);
    }
    
    .hero-controls {
      display: flex;
      gap: 12px;
      margin-top: 30px;
      align-items: center;
    }
    
    .hero-nav {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.5);
      color: white;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    
    .hero-nav:hover {
      background: rgba(255,255,255,0.3);
      border-color: var(--primary);
    }
    
    .hero-dots {
      display: flex;
      gap: 8px;
      margin-left: 15px;
    }
    
    .hero-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .hero-dot.active {
      background: var(--primary);
      width: 28px;
      border-radius: 5px;
    }
    
    /* Mobile: empilhado */
    @media (max-width: 968px) {
      .hero {
        flex-direction: column;
        height: auto;
        min-height: auto;
        padding: 100px 4% 40px;
      }
      
      .hero-content {
        width: 100%;
        padding-right: 0;
        margin-bottom: 30px;
        text-align: center;
      }
      
      .hero-image-container {
        position: relative;
        width: 100%;
        height: 500px;
        transform: none;
        top: auto;
      }
      
      .hero-image {
        max-height: 500px;
      }
      
      .hero-gradient {
        display: none;
      }
      
      .hero h1 {
        font-size: 36px;
      }
      
      .hero-controls {
        justify-content: center;
      }
    }
    
    @media (max-width: 768px) {
      .hero-image-container {
        height: 400px;
      }
      .hero h1 {
        font-size: 28px;
      }
    }
    
    .section {
      padding: 20px 4%;
      margin-bottom: 30px;
    }
    
    .section-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 20px;
    }
    
    .movies-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 18px;
    }
    
    .movie-card {
      position: relative;
      background: var(--card-bg);
      border-radius: 8px;
      overflow: hidden;
      transition: all 0.3s;
      cursor: pointer;
      aspect-ratio: 2/3;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
    
    .movie-card:hover {
      transform: scale(1.05);
      z-index: 10;
      box-shadow: 0 15px 35px rgba(0,0,0,0.6);
    }
    
    .movie-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.3s;
    }
    
    .movie-image.loaded {
      opacity: 1;
    }
    
    .price-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.85);
      color: #4CAF50;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      z-index: 5;
    }
    
    .price-badge.free {
      color: #FFD700;
      background: rgba(229, 9, 20, 0.9);
    }
    
    .movie-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 60px 15px 15px;
      background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }
    
    .movie-card:hover .movie-info {
      opacity: 1;
    }
    
    .categories-scroll {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding: 10px 0;
      margin-bottom: 20px;
    }
    
    .category-chip {
      padding: 10px 20px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 25px;
      color: var(--light);
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.3s;
    }
    
    .category-chip.active {
      background: var(--light);
      color: var(--dark);
      font-weight: 600;
    }
    
    .search-box {
      position: relative;
      max-width: 600px;
      margin: 0 auto 25px;
    }
    
    .search-box input {
      width: 100%;
      padding: 16px 24px 16px 50px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      color: var(--light);
      font-size: 16px;
      outline: none;
    }
    
    .search-box i {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray);
    }
  </style>
</head>
<body>
  <header class="header" id="header">
    <a href="#" class="logo">
      <i class="fas fa-play-circle"></i>
      SÉRIES CURTAS
    </a>
  </header>

  <section class="hero" id="hero-section">
    <div class="hero-gradient"></div>
    
    <div class="hero-content">
      <span class="hero-badge">
        <i class="fas fa-fire"></i>
        Destaque da Semana
      </span>
      <h1 id="hero-title">Carregando...</h1>
      <p class="hero-desc" id="hero-desc">
        As melhores séries curtas estão aqui. Compre e assista instantaneamente!
      </p>
      <div style="display: flex; gap: 12px; flex-wrap: wrap;">
        <button class="btn btn-primary" onclick="buyFeatured()">
          <i class="fas fa-play"></i>
          Comprar Agora
        </button>
        <button class="btn btn-secondary" onclick="scrollToGrid()">
          <i class="fas fa-list"></i>
          Ver Catálogo
        </button>
      </div>
      
      <div class="hero-controls">
        <button onclick="prevHero()" class="hero-nav"><i class="fas fa-chevron-left"></i></button>
        <div class="hero-dots" id="hero-dots"></div>
        <button onclick="nextHero()" class="hero-nav"><i class="fas fa-chevron-right"></i></button>
      </div>
    </div>
    
    <!-- Imagem como cartaz de cinema à direita -->
    <div class="hero-image-container">
      <img id="hero-img" class="hero-image" src="" alt="Banner">
    </div>
  </section>

  <div style="padding: 0 4%;">
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="Buscar séries..." onkeyup="searchSeries(this.value)">
    </div>
  </div>

  <div class="section">
    <div class="categories-scroll">
      <div class="category-chip active" onclick="filterCategory('all')">Todas</div>
      <div class="category-chip" onclick="filterCategory('romance')">❤️ Romance</div>
      <div class="category-chip" onclick="filterCategory('drama')">🎭 Drama</div>
      <div class="category-chip" onclick="filterCategory('suspense')">🔪 Suspense</div>
    </div>
    
    <h2 class="section-title">Catálogo Completo</h2>
    <div class="movies-grid" id="movies-grid"></div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    
    const API_URL = 'https://uyyeascxvnrkjtlygdoe.supabase.co/functions/v1/bot-unificado/api/series';
    let allSeries = [];
    let featuredSeries = null;
    let currentHeroIndex = 0;
    let heroInterval;
    
    const placeholderImages = {
      default: 'https://images.unsplash.com/photo-1440404653325-ab127d49abc1?w=800&q=90'
    };
    
    window.addEventListener('scroll', () => {
      const header = document.getElementById('header');
      if (window.scrollY > 50) header.classList.add('scrolled');
      else header.classList.remove('scrolled');
    });
    
    function updateHeroBackground() {
      const heroImg = document.getElementById('hero-img');
      const heroTitle = document.getElementById('hero-title');
      const heroDesc = document.getElementById('hero-desc');
      
      if (!allSeries.length || !heroImg) return;
      
      const serie = allSeries[currentHeroIndex];
      const imageUrl = serie.cover_url || placeholderImages.default;
      
      heroImg.classList.remove('active');
      
      setTimeout(() => {
        heroImg.src = imageUrl;
        heroImg.onload = () => {
          heroImg.classList.add('active');
        };
      }, 300);
      
      heroTitle.style.opacity = '0';
      heroDesc.style.opacity = '0';
      
      setTimeout(() => {
        heroTitle.textContent = serie.title;
        heroDesc.textContent = serie.description || 'Uma história emocionante que vai prender você do início ao fim.';
        heroTitle.style.opacity = '1';
        heroDesc.style.opacity = '1';
      }, 300);
      
      featuredSeries = serie;
      updateHeroDots();
    }
    
    function updateHeroDots() {
      const dotsContainer = document.getElementById('hero-dots');
      if (!dotsContainer) return;
      
      dotsContainer.innerHTML = allSeries.map((_, index) => 
        `<div class="hero-dot ${index === currentHeroIndex ? 'active' : ''}" onclick="goToHero(${index})"></div>`
      ).join('');
    }
    
    function startHeroSlideshow() {
      if (heroInterval) clearInterval(heroInterval);
      updateHeroBackground();
      heroInterval = setInterval(nextHero, 6000);
    }
    
    function nextHero() {
      currentHeroIndex = (currentHeroIndex + 1) % allSeries.length;
      updateHeroBackground();
    }
    
    function prevHero() {
      currentHeroIndex = (currentHeroIndex - 1 + allSeries.length) % allSeries.length;
      updateHeroBackground();
      resetTimer();
    }
    
    function goToHero(index) {
      currentHeroIndex = index;
      updateHeroBackground();
      resetTimer();
    }
    
    function resetTimer() {
      if (heroInterval) {
        clearInterval(heroInterval);
        heroInterval = setInterval(nextHero, 6000);
      }
    }
    
    async function loadSeries() {
      try {
        const res = await fetch(API_URL);
        if (!res.ok) throw new Error('Erro na API');
        
        allSeries = await res.json();
        startHeroSlideshow();
        renderGrid(allSeries);
        
      } catch (e) {
        console.error('Erro:', e);
        document.getElementById('movies-grid').innerHTML = 
          '<div style="text-align: center; padding: 40px; color: #666;">Erro ao carregar séries</div>';
      }
    }
    
    function renderGrid(series) {
      const grid = document.getElementById('movies-grid');
      if (!series || !series.length) {
        grid.innerHTML = '<p style="color: #666; text-align: center;">Nenhuma série encontrada</p>';
        return;
      }
      
      grid.innerHTML = series.map((s) => {
        const isFree = s.price == 0;
        const priceText = isFree ? 'GRÁTIS' : `R$ ${s.price}`;
        const priceClass = isFree ? 'free' : '';
        const imgUrl = s.cover_url || placeholderImages.default;
        
        return `
          <div class="movie-card" onclick="buy('${s.id}', '${s.title.replace(/'/g, "\\'")}', ${s.price})">
            <img src="${imgUrl}" class="movie-image" alt="${s.title}" loading="lazy" onload="this.classList.add('loaded')" onerror="this.style.opacity='1'">
            <span class="price-badge ${priceClass}">${priceText}</span>
            <div class="movie-info">
              <h3 style="font-size: 14px; font-weight: 600; margin-bottom: 5px;">${s.title}</h3>
              <div class="movie-price ${priceClass}">${priceText}</div>
            </div>
          </div>
        `;
      }).join('');
    }
    
    function filterCategory(cat) {
      document.querySelectorAll('.category-chip').forEach(chip => chip.classList.remove('active'));
      event.target.classList.add('active');
      
      if (cat === 'all') renderGrid(allSeries);
      else {
        const filtered = allSeries.filter(s => s.category === cat || s.title.toLowerCase().includes(cat));
        renderGrid(filtered);
      }
    }
    
    function searchSeries(term) {
      if (!term) {
        renderGrid(allSeries);
        return;
      }
      
      const filtered = allSeries.filter(s => 
        s.title.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '')
          .includes(term.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, ''))
      );
      renderGrid(filtered);
    }
    
    function buy(id, title, price) {
      tg.sendData(JSON.stringify({ action: 'buy', series_id: id, title, price }));
      tg.close();
    }
    
    function buyFeatured() {
      if (featuredSeries) buy(featuredSeries.id, featuredSeries.title, featuredSeries.price);
    }
    
    function scrollToGrid() {
      window.scrollTo({ top: document.getElementById('movies-grid').offsetTop - 100, behavior: 'smooth' });
    }
    
    loadSeries();
  </script>
</body>
</html>

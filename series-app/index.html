<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Séries Curtas Express</title>
  <!-- Carregar Font Awesome primeiro (importante para ícones) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --primary: #E50914;
      --primary-dark: #B20710;
      --dark: #141414;
      --darker: #0F0F0F;
      --gray: #808080;
      --light: #FFFFFF;
      --card-bg: #181818;
      --hover: #2F2F2F;
      --success: #4CAF50;
      --gold: #FFD700;
      --text-main: #FFFFFF;
      --text-dim: #E5E5E5;
      --bg-body: #0F0F0F;
      --skeleton: #252525;
    }
    
    body.light-mode { 
      --dark: #f5f5f5; 
      --darker: #ffffff; 
      --card-bg: #f0f0f0; 
      --hover: #e0e0e0; 
      --text-main: #141414; 
      --text-dim: #333333; 
      --bg-body: #f5f5f5; 
      --skeleton: #e0e0e0; 
    }

    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
      -webkit-tap-highlight-color: transparent;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg-body); 
      color: var(--text-main); 
      overflow-x: hidden;
    }

    /* ==========================================
       PLAYER PROTEGIDO (com botão voltar)
       ========================================== */
    .video-player-overlay {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 10000;
      display: none;
      flex-direction: column;
    }
    
    .video-player-overlay.active {
      display: flex;
    }

    .player-topbar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: linear-gradient(180deg, rgba(0,0,0,0.95) 0%, transparent 100%);
      padding-top: max(12px, env(safe-area-inset-top));
    }
    
    .btn-back-player {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
      backdrop-filter: blur(10px);
      text-decoration: none;
    }
    
    .btn-back-player:hover,
    .btn-back-player:active {
      background: var(--primary);
      border-color: var(--primary);
      transform: translateX(-2px);
    }
    
    .player-title-text {
      font-size: 13px;
      font-weight: 600;
      color: white;
      max-width: 60%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    .btn-close-player {
      background: transparent;
      border: none;
      color: white;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: background 0.2s;
    }
    
    .btn-close-player:hover {
      background: rgba(255,255,255,0.1);
    }

    .player-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      background: #000;
    }
    
    video {
      width: 100%;
      height: auto;
      min-height: 200px;
      object-fit: contain;
      background: #000;
      controlsList: "nodownload noremoteplayback";
    }

    /* Estados do player */
    .loading-player {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      z-index: 15;
      gap: 16px;
    }
    
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .player-error-state {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      z-index: 15;
      gap: 16px;
      padding: 32px;
      text-align: center;
    }
    
    .error-icon {
      font-size: 48px;
      color: var(--primary);
      margin-bottom: 8px;
    }
    
    .error-text {
      color: #ccc;
      font-size: 15px;
      line-height: 1.4;
      max-width: 280px;
    }
    
    .btn-retry-player {
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      transition: transform 0.2s;
    }
    
    .btn-retry-player:hover {
      transform: scale(1.05);
    }

    .player-watermark {
      position: absolute;
      bottom: 70px;
      right: 12px;
      z-index: 5;
      background: rgba(0,0,0,0.7);
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 11px;
      color: rgba(255,255,255,0.7);
      font-family: monospace;
      letter-spacing: 0.5px;
    }

    /* ==========================================
       CARRINHO (Drawer) - Ícones visíveis
       ========================================== */
    .cart-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 9998;
      opacity: 0;
      visibility: hidden;
      transition: 0.3s;
      backdrop-filter: blur(4px);
    }
    
    .cart-overlay.active {
      opacity: 1;
      visibility: visible;
    }
    
    .cart-drawer {
      position: fixed;
      top: 0;
      right: -100%;
      width: 90%;
      max-width: 380px;
      height: 100%;
      background: var(--card-bg);
      z-index: 9999;
      transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      box-shadow: -10px 0 40px rgba(0,0,0,0.6);
    }
    
    .cart-drawer.active {
      right: 0;
    }

    .cart-header {
      padding: 20px;
      border-bottom: 1px solid rgba(128,128,128,0.25);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--darker);
    }
    
    .cart-header h3 {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 17px;
      font-weight: 800;
      /* Garantir que ícone apareça */
    }
    
    .cart-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }
    
    .cart-item {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
      background: rgba(0,0,0,0.3);
      padding: 12px;
      border-radius: 10px;
      position: relative;
    }
    
    .cart-item img {
      width: 50px;
      height: 75px;
      object-fit: cover;
      border-radius: 6px;
      background: var(--skeleton);
    }
    
    .cart-item-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
    }
    
    .cart-item-title {
      font-weight: 600;
      font-size: 13px;
      line-height: 1.3;
      color: var(--text-main);
    }
    
    .cart-item-price {
      color: var(--success);
      font-weight: 700;
      font-size: 13px;
    }
    
    .cart-item-remove {
      position: absolute;
      top: 8px;
      right: 8px;
      background: none;
      border: none;
      color: #ff4444;
      cursor: pointer;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex !important; /* Forçar display flex para ícone aparecer */
      align-items: center;
      justify-content: center;
      transition: 0.2s;
      font-size: 12px;
    }
    
    .cart-item-remove:hover {
      background: rgba(255,68,68,0.15);
    }

    .cart-footer {
      padding: 20px;
      border-top: 1px solid rgba(128,128,128,0.25);
      background: var(--darker);
    }
    
    .cart-total {
      display: flex;
      justify-content: space-between;
      font-size: 18px;
      margin-bottom: 16px;
      font-weight: 800;
    }
    
    .cart-total span:last-child {
      color: var(--success);
      font-size: 22px;
    }

    /* ==========================================
       HEADER FIXO
       ========================================== */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(to bottom, rgba(0,0,0,0.95), transparent);
      transition: all 0.3s;
      padding-top: calc(12px + env(safe-area-inset-top));
    }
    
    .header.scrolled {
      background: var(--darker);
      box-shadow: 0 2px 20px rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
    }
    
    .logo {
      font-size: 19px;
      font-weight: 800;
      color: var(--primary);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
      /* Garantir ícone visível */
    }
    
    .header-actions {
      display: flex;
      gap: 10px;
    }
    
    .icon-btn {
      background: rgba(255,255,255,0.1);
      border: none;
      color: var(--text-main);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: flex !important; /* IMPORTANTE: forçar ícone a aparecer */
      align-items: center;
      justify-content: center;
      position: relative;
      transition: all 0.2s;
      font-size: 16px;
    }
    
    .icon-btn:hover {
      background: var(--primary);
      transform: scale(1.05);
    }
    
    .badge {
      position: absolute;
      top: -4px;
      right: -4px;
      background: var(--primary);
      color: white;
      font-size: 10px;
      font-weight: 700;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex !important;
      align-items: center;
      justify-content: center;
      border: 2px solid var(--darker);
      font-family: 'Inter', sans-serif;
    }

    /* ==========================================
       HERO SECTION - BANNERS DESLIZANTES
       ========================================== */
    .hero {
      position: relative;
      width: 100%;
      min-height: 85vh;
      min-height: 85svh;
      display: flex;
      align-items: center;
      overflow: hidden;
      background: var(--darker);
    }
    
    /* Container principal do hero com transição suave */
    .hero-slide-container {
      position: relative;
      width: 100%;
      height: 100%;
    }
    
    .hero-slide {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      padding: 80px 24px 40px;
      gap: 30px;
      opacity: 0;
      visibility: hidden;
      transition: all 0.8s ease-in-out;
    }
    
    .hero-slide.active {
      opacity: 1;
      visibility: visible;
    }
    
    /* Background image do banner com blur/gradient */
    .hero-bg-image {
      position: absolute;
      inset: 0;
      z-index: 0;
      background-size: cover;
      background-position: center;
      filter: brightness(0.4);
      transition: opacity 1s ease;
    }
    
    .hero-gradient {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 70%;
      z-index: 1;
      background: linear-gradient(to right, 
        var(--darker) 0%, 
        rgba(15,15,15,0.9) 50%,
        rgba(15,15,15,0.7) 75%,
        transparent 100%
      );
    }
    
    .hero-content {
      position: relative;
      z-index: 2;
      width: 55%;
      max-width: 550px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    /* Banner GRÁTIS destacado no Hero */
    .hero-banner-free {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, #FFD700, #FFA500);
      color: #000;
      padding: 8px 16px;
      border-radius: 25px;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 4px 15px rgba(255,215,0,0.4);
      animation: pulse-gold 2s infinite;
      width: fit-content;
    }
    
    @keyframes pulse-gold {
      0%, 100% { box-shadow: 0 4px 15px rgba(255,215,0,0.4); }
      50% { box-shadow: 0 4px 25px rgba(255,215,0,0.8); }
    }
    
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--primary);
      color: white;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      width: fit-content;
    }
    
    .hero h1 {
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.02em;
      text-wrap: balance;
      text-shadow: 0 2px 20px rgba(0,0,0,0.5);
    }
    
    .hero-desc {
      font-size: 15px;
      color: var(--text-dim);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    .btn-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    
    .btn {
      padding: 14px 24px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: inline-flex !important; /* Garante ícone dentro do botão */
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
      text-decoration: none;
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }
    
    .btn-primary {
      background: white;
      color: var(--dark);
    }
    
    .btn-play {
      background: var(--primary);
      color: white;
    }
    
    .btn-free {
      background: linear-gradient(135deg, #FFD700, #FFA500);
      color: #000;
      font-weight: 900;
      box-shadow: 0 4px 15px rgba(255,215,0,0.4);
      animation: pulse-gold 2s infinite;
    }
    
    .btn-cart {
      background: var(--success);
      color: white;
      width: 100%;
      justify-content: center;
      padding: 16px;
      font-size: 15px;
    }
    
    .btn-outline {
      background: transparent;
      border: 2px solid rgba(255,255,255,0.3);
      color: var(--text-main);
    }
    
    /* Poster lateral no Hero */
    .hero-poster-container {
      position: absolute;
      right: 5%;
      top: 50%;
      transform: translateY(-50%);
      width: 45%;
      max-width: 380px;
      aspect-ratio: 2/3;
      z-index: 3;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.05);
      transition: transform 0.5s ease;
    }
    
    .hero-poster {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.8s ease;
    }
    
    .hero-poster.loaded {
      opacity: 1;
    }
    
    /* Indicadores de slide (pontos) */
    .hero-indicators {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 8px;
    }
    
    .indicator-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transition: all 0.3s;
      cursor: pointer;
    }
    
    .indicator-dot.active {
      background: var(--primary);
      width: 24px;
      border-radius: 4px;
    }

    /* ==========================================
       CATÁLOGO E GRID
       ========================================== */
    .section {
      padding: 32px 16px 80px;
      position: relative;
    }
    
    .search-box {
      position: relative;
      margin-bottom: 20px;
    }
    
    .search-box input {
      width: 100%;
      padding: 14px 20px 14px 46px;
      background: rgba(128,128,128,0.15);
      border: 1px solid rgba(128,128,128,0.2);
      border-radius: 12px;
      color: var(--text-main);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    
    .search-box input:focus {
      border-color: var(--primary);
    }
    
    .search-box i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray);
      font-size: 14px;
    }

    .categories {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      overflow-x: auto;
      padding-bottom: 8px;
      scrollbar-width: none;
    }
    
    .categories::-webkit-scrollbar {
      display: none;
    }
    
    .category-chip {
      padding: 8px 16px;
      background: rgba(128,128,128,0.15);
      border: 1px solid rgba(128,128,128,0.2);
      border-radius: 20px;
      color: var(--text-main);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
    }
    
    .category-chip:hover {
      background: rgba(128,128,128,0.25);
    }
    
    .category-chip.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }
    
    .section-title {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 20px;
      color: var(--text-main);
    }
    
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
    }
    
    @media (min-width: 600px) {
      .grid {
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 16px;
      }
    }
    
    /* CARD COM BANNER GRATIS DESTACADO */
    .card {
      background: var(--card-bg);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
      aspect-ratio: 2/3;
      border: 1px solid rgba(255,255,255,0.03);
    }
    
    .card:hover {
      transform: translateY(-4px) scale(1.02);
      z-index: 10;
      box-shadow: 0 12px 30px rgba(0,0,0,0.6);
      border-color: rgba(255,255,255,0.08);
    }
    
    .card:active {
      transform: scale(0.98);
    }
    
    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.4s ease;
      background: var(--skeleton);
    }
    
    .card img.loaded {
      opacity: 1;
    }
    
    /* Banner GRÁTIS no Card - SUPER VISÍVEL */
    .badge-free-card {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 5;
      background: linear-gradient(135deg, #FFD700, #FFA500);
      color: #000 !important;
      font-weight: 900 !important;
      font-size: 10px !important;
      padding: 5px 10px;
      border-radius: 6px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      box-shadow: 0 2px 10px rgba(255,215,0,0.5);
      display: inline-flex !important;
      align-items: center;
      gap: 4px;
      animation: pulse-gold 2s infinite;
    }
    
    .price-tag {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(4px);
      color: var(--success);
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 800;
      z-index: 5;
      text-transform: uppercase;
    }
    
    .card-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 45px 12px 10px;
      background: linear-gradient(
        to top, 
        rgba(0,0,0,0.95) 0%, 
        rgba(0,0,0,0.7) 60%, 
        transparent 100%
      );
      opacity: 0;
      transition: opacity 0.3s;
    }
    
    .card:hover .card-info {
      opacity: 1;
    }
    
    .card-title {
      font-size: 12px;
      font-weight: 700;
      color: white;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ==========================================
       MODAL DE DETALHES
       ========================================== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 9997;
      display: none;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transition: opacity 0.3s;
    }
    
    .modal-overlay.active {
      display: flex;
      opacity: 1;
    }
    
    .modal-content {
      background: var(--card-bg);
      border-radius: 20px;
      width: 92%;
      max-width: 480px;
      max-height: 88vh;
      overflow-y: auto;
      position: relative;
      transform: scale(0.9);
      transition: transform 0.3s;
      box-shadow: 0 -10px 40px rgba(0,0,0,0.6);
    }
    
    .modal-overlay.active .modal-content {
      transform: scale(1);
    }
    
    .modal-close {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0,0,0,0.7);
      border: none;
      color: white;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      z-index: 10;
      display: flex !important;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
    }
    
    .modal-close:hover {
      background: var(--primary);
    }
    
    .modal-hero {
      position: relative;
      height: 220px;
      overflow: hidden;
      background: var(--skeleton);
    }
    
    .modal-hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .modal-body {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .modal-title {
      font-size: 22px;
      font-weight: 800;
      line-height: 1.2;
    }
    
    /* Preço GRÁTIS no Modal super destaque */
    .modal-price {
      font-size: 22px;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .modal-price.free {
      color: var(--gold);
    }
    
    .free-badge-modal {
      background: linear-gradient(135deg, #FFD700, #FFA500);
      color: #000;
      font-weight: 900;
      padding: 10px 20px;
      border-radius: 25px;
      font-size: 15px;
      box-shadow: 0 4px 15px rgba(255,215,0,0.5);
      animation: pulse-gold 2s infinite;
      display: inline-flex !important;
      align-items: center;
      gap: 8px;
    }
    
    .modal-desc {
      color: var(--text-dim);
      line-height: 1.6;
      font-size: 14px;
    }
    
    .modal-actions {
      display: flex;
      gap: 12px;
      flex-direction: column;
      margin-top: 8px;
    }

    /* TOAST NOTIFICATIONS */
    .toast-container {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10001;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
      width: calc(100% - 32px);
      max-width: 360px;
    }
    
    .toast {
      background: rgba(30,30,30,0.96);
      color: white;
      padding: 14px 20px;
      border-radius: 12px;
      display: flex !important;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 600;
      transform: translateY(20px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      width: 100%;
    }
    
    body.light-mode .toast {
      background: rgba(255,255,255,0.96);
      color: #141414;
      border-color: rgba(0,0,0,0.08);
    }
    
    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }
    
    .toast-icon {
      font-size: 18px;
      width: 20px;
      text-align: center;
      display: inline-flex !important;
      justify-content: center;
    }
    
    .toast-success .toast-icon { color: var(--success); }
    .toast-error .toast-icon { color: #ff4444; }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .hero {
        min-height: auto;
        padding-top: 80px;
        padding-bottom: 40px;
      }
      
      .hero-slide {
        flex-direction: column-reverse;
        text-align: center;
        padding: 100px 16px 32px;
      }
      
      .hero-content {
        width: 100%;
        order: 2;
        align-items: center;
      }
      
      .hero-poster-container {
        position: relative;
        width: 65%;
        max-width: 280px;
        transform: none;
        order: 1;
        margin-bottom: 20px;
      }
      
      .hero-gradient {
        display: none;
      }
      
      .hero h1 {
        font-size: 26px;
      }
      
      .btn-group {
        width: 100%;
        justify-content: center;
      }
      
      .btn-play, .btn-free {
        width: 100%;
        justify-content: center;
      }
      
      .cart-drawer {
        width: 100%;
        max-width: 100%;
      }
      
      .header {
        padding: 10px 12px;
      }
    }
    
    @media (max-width: 380px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }
    }
  </style>
</head>

<!-- PLAYER PROTEGIDO -->

<script>
// ==========================================
// CONFIGURAÇÃO INICIAL
// ==========================================
const tg = window.Telegram.WebApp;
tg.expand();
tg.enableClosingConfirmation();

const API_URL = 'https://uyyeascxvnrkjtlygdoe.supabase.co/functions/v1/bot-unificado';
const userId = tg.initDataUnsafe?.user?.id || 'anonymous';

// Estado Global
let allSeries = [];
let cart = [];
let currentHeroIndex = 0;
let heroInterval = null;
let currentModalSerie = null;
let retryData = null;

// Inicializa carrinho do localStorage
try {
  const savedCart = localStorage.getItem('cart_series');
  if (savedCart) cart = JSON.parse(savedCart);
} catch(e) {
  cart = [];
}

// ==========================================
// FUNÇÕES PRINCIPAIS
// ==========================================

async function init() {
  applyTheme();
  await loadSeries();
  updateCartUI();
  setupScrollListener();
}

function setupScrollListener() {
  window.addEventListener('scroll', () => {
    const header = document.getElementById('header');
    if (window.scrollY > 50) {
      header.classList.add('scrolled');
    } else {
      header.classList.remove('scrolled');
    }
  }, { passive: true });
  
  // Fecha modais/player com ESC
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      closePlayer();
      closeModal(null);
    }
  });
}

// TEMA CLARO/ESCURO
function applyTheme() {
  const theme = localStorage.getItem('theme_series');
  if (theme === 'light') {
    document.body.classList.add('light-mode');
    document.getElementById('themeIcon').className = 'fas fa-sun';
  } else {
    document.getElementById('themeIcon').className = 'fas fa-moon';
  }
}

function toggleTheme() {
  const isLight = document.body.classList.toggle('light-mode');
  localStorage.setItem('theme_series', isLight ? 'light' : 'dark');
  document.getElementById('themeIcon').className = isLight ? 'fas fa-sun' : 'fas fa-moon';
  showToast(isLight ? 'Tema Claro Ativado' : 'Tema Escuro Ativado', 'success');
}

// CARREGAR SÉRIES DA API
async function loadSeries() {
  try {
    const res = await fetch(`${API_URL}/api/series`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    
    const data = await res.json();
    if (!Array.isArray(data)) throw new Error('Formato inválido');
    
    allSeries = data;
    renderCatalog(allSeries);
    initHeroSlider();
    
  } catch (err) {
    console.error('Erro ao carregar:', err);
    showToast('Erro ao carregar séries', 'error');
    
    // Dados mock para teste enquanto API não funciona
    allSeries = [
      { 
        id: 101, 
        title: "Amor Proibido", 
        description: "Uma paixão proibida que pode mudar tudo...", 
        price: 0, 
        category: "romance", 
        cover_url: "https://images.unsplash.com/photo-1518676590629-3dcbd9c5a5c9?w=400&h=600&fit=crop" 
      },
      { 
        id: 102, 
        title: "Vingança Real", 
        description: "No reino, traição é moeda corrente.", 
        price: 9.90, 
        category: "drama", 
        cover_url: "https://images.unsplash.com/photo-1509347528160-9a9e33738cdb?w=400&h=600&fit=crop" 
      },
      { 
        id: 103, 
        title: "O Contrato", 
        description: "Assine e morra tentando sobreviver.", 
        price: 0, 
        category: "suspense", 
        cover_url: "https://images.unsplash.com/photo-1485846234645-a62644f84728?w=400&h=600&fit=crop" 
      },
      { 
        id: 104, 
        title: "Além das Sombras", 
        description: "Mistérios sobrenaturais revelados.", 
        price: 19.90, 
        category: "drama", 
        cover_url: "https://images.unsplash.com/photo-1534447677768-be436bb09401?w=400&h=600&fit=crop" 
      },
      { 
        id: 105, 
        title: "Coração Selvagem", 
        description: "Um romance inesperado na selva urbana.", 
        price: 0, 
        category: "romance", 
        cover_url: "https://images.unsplash.com/photo-1518562180135-665079c8db4c?w=400&h=600&fit=crop" 
      }
    ];
    
    renderCatalog(allSeries);
    initHeroSlider();
  }
}

// ==========================================
// HERO SLIDER - BANNERS DESLIZANTES
// ==========================================
function initHeroSlider() {
  const container = document.getElementById('heroContainer');
  const indicators = document.getElementById('heroIndicators');
  
  if (!allSeries.length) return;
  
  // Filtra séries para exibição no hero (preferencialmente gratuitas ou primeiras)
  const heroSeries = allSeries.slice(0, Math.min(5, allSeries.length));
  
  // Criar slides HTML
  container.innerHTML = '';
  indicators.innerHTML = '';
  
  heroSeries.forEach((serie, index) => {
    const isFree = parseFloat(serie.price) === 0;
    
    // Slide div
    const slide = document.createElement('div');
    slide.className = `hero-slide ${index === 0 ? 'active' : ''}`;
    
    slide.innerHTML = `
      <div class="hero-bg-image" style="background-image:url('${serie.cover_url || ''}')"></div>
      <div class="hero-gradient"></div>
      
      <div class="hero-content">
        ${isFree ? `
          <div class="hero-banner-free">
            <i class="fas fa-star"></i> GRÁTIS AGORA
          </div>
        ` : `
          <div class="hero-badge">
            <i class="fa-fire"></i> Destaque
          </div>
        `}
        
        <h1>${serie.title || 'Sem título'}</h1>
        <p class="hero-desc">${serie.description || 'Uma história incrível...'}</p>
        
        <div class="btn-group">
          <button class="btn btn-primary" onclick="scrollToCatalog()">
            <i class="fas fa-list"></i> Explorar Catálogo
          </button>
          
          ${isFree ? `
            <button class="btn btn-free" onclick="openPlayer(${serie.id}, '${encodeURIComponent(serie.title)}')">
              <i class="fas fa-play-circle"></i> Assistir Grátis Agora
            </button>
          ` : `
            <button class="btn btn-play" onclick="openModal(findSerieById(${serie.id}))">
              <i class="fas fa-play"></i> Ver Detalhes
            </button>
          `}
        </div>
      </div>
      
      ${serie.cover_url ? `
        <div class="hero-poster-container">
          <img src="${serie.cover_url}" alt="${serie.title}" class="hero-poster loaded">
        </div>
      ` : ''}
    `;
    
    container.appendChild(slide);
    
    // Indicador dot
    const dot = document.createElement('div');
    dot.className = `indicator-dot ${index === 0 ? 'active' : ''}`;
    dot.onclick = () => goToSlide(index);
    indicators.appendChild(dot);
  });
  
  // Auto play a cada 5 segundos
  startAutoPlay(heroSeries.length);
}

function goToSlide(index) {
  const slides = document.querySelectorAll('.hero-slide');
  const dots = document.querySelectorAll('.indicator-dot');
  const totalSlides = slides.length;
  
  if (index >= totalSlides) index = 0;
  if (index < 0) index = totalSlides - 1;
  
  currentHeroIndex = index;
  
  slides.forEach((slide, i) => {
    if (i === index) {
      slide.classList.add('active');
    } else {
      slide.classList.remove('active');
    }
  });
  
  dots.forEach((dot, i) => {
    if (i === index) {
      dot.classList.add('active');
    } else {
      dot.classList.remove('active');
    }
  });
}

function nextSlide() {
  const totalSlides = document.querySelectorAll('.hero-slide').length;
  goToSlide(currentHeroIndex + 1);
}

function startAutoPlay(totalSlides) {
  if (heroInterval) clearInterval(heroInterval);
  
  if (totalSlides > 1) {
    heroInterval = setInterval(nextSlide, 5000); // Muda a cada 5 segundos
  }
}

function findSerieById(id) {
  return allSeries.find(s => s.id === id) || allSeries[0];
}

function scrollToCatalog() {
  document.getElementById('catalogSection').scrollIntoView({ behavior: 'smooth' });
}

// ==========================================
// PLAYER PROTEGIDO
// ==========================================
function showLoading(msg) {
  document.getElementById('playerLoading').style.display = 'flex';
  document.getElementById('playerLoading').querySelector('div:last-child').textContent = msg || 'Carregando...';
  document.getElementById('mainVideo').style.display = 'none';
  document.getElementById('playerErrorState').style.display = 'none';
}

function showErrorState() {
  document.getElementById('playerLoading').style.display = 'none';
  document.getElementById('mainVideo').style.display = 'none';
  document.getElementById('playerErrorState').style.display = 'flex';
}

function hideAllStates() {
  document.getElementById('playerLoading').style.display = 'none';
  document.getElementById('playerErrorState').style.display = 'none';
  document.getElementById('mainVideo').style.display = 'block';
}

async function openPlayer(serieId, title) {
  retryData = { id: serieId, title: decodeURIComponent(title || '') };
  
  const overlay = document.getElementById('playerOverlay');
  overlay.classList.add('active');
  
  document.getElementById('playerTitle').textContent = title || 'Carregando vídeo...';
  document.getElementById('watermarkId').textContent = String(userId).slice(0, 8) + '...';
  
  showLoading('Gerando link seguro...');
  
  try {
    // Timeout de 15 segundos para fetch
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 15000);
    
    const response = await fetch(`${API_URL}/api/stream/${serieId}?user_id=${userId}`, {
      signal: controller.signal
    });
    
    clearTimeout(timeoutId);
    
    if (!response.ok) throw new Error(`Erro HTTP: ${response.status}`);
    
    const data = await response.json();
    
    if (data.error) throw new Error(data.error);
    
    // Se tipo telegram, envia para app
    if (data.type === 'telegram') {
      tg.sendData(JSON.stringify({
        action: 'request_video',
        series_id: parseInt(serieId)
      }));
      showToast('Abrindo no Telegram...', 'info');
      setTimeout(() => closePlayer(), 1500);
      return;
    }
    
    // Configura vídeo
    const videoUrl = data.url || data.video_url || data.video;
    if (!videoUrl) throw new Error('URL do vídeo vazia');
    
    const video = document.getElementById('mainVideo');
    video.muted = true;
    video.src = videoUrl;
    
    // Espera estar pronto
    await new Promise((resolve, reject) => {
      video.oncanplaythrough = resolve;
      video.onerror = reject;
      setTimeout(reject, 10000); // 10s timeout para carga do vídeo
    });
    
    hideAllStates();
    
    // Tenta autoplay
    try {
      await video.play();
      // Desmuta após começar (se já interagiu antes)
      setTimeout(() => {
        if (video.duration > 0) video.muted = false;
      }, 300);
    } catch (autoplayErr) {
      console.warn('Autoplay bloqueado:', autoplayErr);
      video.controls = true;
      
      // Botão central grande como fallback
      const btn = document.createElement('div');
      btn.innerHTML = '<i class="fas fa-play"></i>';
      btn.style.cssText = `
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 80px; height: 80px;
        background: rgba(229, 9, 20, 0.93);
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer;
        color: white; z-index: 30;
        font-size: 32px;
        border: 3px solid white;
        box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        animation: pulse-gold 1.5s infinite;
      `;
      btn.onclick = async () => {
        try {
          await video.play();
          video.muted = false;
          btn.remove();
        } catch(e) {
          video.muted = true;
          await video.play().catch(() => {});
          btn.remove();
        }
      };
      video.parentElement.appendChild(btn);
      showToast('Clique para reproduzir', 'info');
    }
    
  } catch (err) {
    console.error('Erro Player:', err);
    
    // Diferencia erro de timeout vs network
    let errorMsg = 'Erro ao carregar';
    if (err.name === 'AbortError') {
      errorMsg = 'Tempo esgotado';
    } else if (err.message.includes('Failed to fetch') || err.message.includes('NetworkError')) {
      errorMsg = 'Falha de conexão';
    }
    
    showErrorState();
    showToast(errorMsg, 'error');
    
    // Configura botão de retry
    const retryBtn = document.querySelector('.btn-retry-player');
    if (retryBtn) {
      retryBtn.onclick = () => openPlayer(retryData.id, retryData.title);
    }
  }
}

function closePlayer() {
  const overlay = document.getElementById('playerOverlay');
  const video = document.getElementById('mainVideo');
  
  if (video) {
    video.pause();
    video.removeAttribute('src');
    video.load();
    video.style.display = 'none';
    video.muted = false;
    video.oncanplaythrough = null;
    video.onerror = null;
  }
  
  // Remove botão fallback se existir
  const btnFallback = overlay.querySelector('[style*="position: absolute"][style*="border-radius: 50%"]');
  if (btnFallback && btnFallback.closest('.player-container')) {
    btnFallback.remove();
  }
  
  overlay.classList.remove('active');
  retryData = null;
}

// ==========================================
// SISTEMA DE CARRINHO
// ==========================================
function toggleCart() {
  const drawer = document.getElementById('cartDrawer');
  const overlay = document.getElementById('cartOverlay');
  const isActive = drawer.classList.contains('active');
  
  drawer.classList.toggle('active');
  overlay.classList.toggle('active', !isActive);
  document.body.style.overflow = !isActive ? 'hidden' : '';
}

function addToCart(serie) {
  if (cart.find(item => item.id === serie.id)) {
    showToast('Já está no carrinho!', 'error');
    return;
  }
  
  cart.push(serie);
  localStorage.setItem('cart_series', JSON.stringify(cart));
  updateCartUI();
  showToast(`${serie.title} adicionado!`, 'success');
}

function removeFromCart(id) {
  cart = cart.filter(item => item.id !== id);
  localStorage.setItem('cart_series', JSON.stringify(cart));
  updateCartUI();
  showToast('Removido do carrinho', 'info');
}

function updateCartUI() {
  const container = document.getElementById('cartItems');
  const badge = document.getElementById('cartBadge');
  const totalEl = document.getElementById('cartTotal');
  
  badge.textContent = cart.length;
  badge.style.display = cart.length > 0 ? 'flex' : 'none';
  
  let total = 0;
  
  if (cart.length === 0) {
    container.innerHTML = `
      <div style="
        text-align: center; 
        padding: 40px 20px; 
        color: var(--gray);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      ">
        <i class="fa-shopping-basket" style="font-size: 48px; opacity: 0.3;"></i>
        <p style="font-weight: 600;">Seu carrinho está vazio</p>
        <p style="font-size: 13px; opacity: 0.7;">Adicione séries aqui!</p>
      </div>
    `;
  } else {
    container.innerHTML = cart.map(item => {
      total += parseFloat(item.price || 0);
      return `
        <div class="cart-item">
          <img src="${item.cover_url}" alt="${item.title}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 50 75%22 fill=%22%23252525%22><rect width=%2250%22 height=%2275%22/></svg>'">
          <div class="cart-item-info">
            <div class="cart-item-title">${item.title}</div>
            <div class="cart-item-price">${parseFloat(item.price) === 0 ? '<strong style="color:#FFD700">GRÁTIS</strong>' : 'R$ ' + parseFloat(item.price).toFixed(2)}</div>
          </div>
          <button class="cart-item-remove" onclick="removeFromCart('${item.id}')" title="Remover">
            <i class="fas fa-trash-alt"></i>
          </button>
        </div>
      `;
    }).join('');
  }
  
  totalEl.textContent = total === 0 ? 'R$ 0,00' : 'R$ ' + total.toFixed(2);
}

function checkout() {
  if (cart.length === 0) {
    showToast('Carrinho vazio!', 'error');
    return;
  }
  
  const total = cart.reduce((sum, item) => sum + parseFloat(item.price || 0), 0);
  
  tg.sendData(JSON.stringify({
    action: 'checkout_cart',
    items: cart,
    total: total,
    user_id: userId
  }));
  
  showToast('Processando compra...', 'success');
  
  setTimeout(() => {
    cart = [];
    localStorage.setItem('cart_series', '[]');
    updateCartUI();
    toggleCart();
    tg.close(); // Fecha mini app
  }, 1500);
}

// ==========================================
// MODAL DE DETALHES
// ==========================================
function openModal(serie) {
  currentModalSerie = serie;
  
  document.getElementById('modalImg').src = serie.cover_url || '';
  document.getElementById('modalImg').style.display = 'block';
  document.getElementById('modalImg').onerror = function() { this.style.display = 'none'; };
  
  document.getElementById('modalTitle').textContent = serie.title || 'Sem título';
  document.getElementById('modalDesc').textContent = serie.description || 'Sem descrição disponível.';
  
  const priceEl = document.getElementById('modalPrice');
  const actionsDiv = document.getElementById('modalActions');
  actionsDiv.innerHTML = '';
  
  const price = parseFloat(serie.price || 0);
  
  if (price === 0) {
    // SERIE GRATIS - Destaque máximo
    priceEl.className = 'modal-price free';
    priceEl.innerHTML = `
      <div class="free-badge-modal">
        <i class="fas fa-gift"></i> COMPLETAMENTE GRÁTIS
      </div>
    `;
    
    const watchBtn = document.createElement('button');
    watchBtn.className = 'btn btn-free';
    watchBtn.style.width = '100%';
    watchBtn.style.padding = '16px';
    watchBtn.style.fontSize = '16px';
    watchBtn.innerHTML = '<i class="fas fa-play-circle"></i> ASSISTIR AGORA (GRÁTIS)';
    watchBtn.onclick = () => {
      closeModal(null);
      openPlayer(serie.id, encodeURIComponent(serie.title));
    };
    actionsDiv.appendChild(watchBtn);
    
  } else {
    // SERIE PAGA
    priceEl.className = 'modal-price';
    priceEl.innerHTML = `<span id="priceValue">R$ ${price.toFixed(2)}</span>`;
    
    const row1 = document.createElement('div');
    row1.style.cssText = 'display: flex; gap: 10px;';
    
    const addCartBtn = document.createElement('button');
    addCartBtn.className = 'btn btn-outline';
    addCartBtn.style.flex = '1';
    addCartBtn.style.borderColor = 'var(--primary)';
    addCartBtn.innerHTML = '<i class="fas fa-cart-plus"></i> Carrinho';
    addCartBtn.onclick = () => {
      addToCart(serie);
      showModalSuccessFeedback();
    };
    
    const buyNowBtn = document.createElement('button');
    buyNowBtn.className = 'btn btn-primary';
    buyNowBtn.style.flex = '1';
    buyNowBtn.innerHTML = `<i class="fas fa-bolt"></i> Comprar R$${price.toFixed(2)}`;
    buyNowBtn.onclick = () => {
      tg.sendData(JSON.stringify({
        action: 'buy',
        series_id: serie.id,
        title: serie.title,
        price: price
      }));
      tg.close();
    };
    
    row1.appendChild(addCartBtn);
    row1.appendChild(buyNowBtn);
    actionsDiv.appendChild(row1);
  }
  
  document.getElementById('modalOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function showModalSuccessFeedback() {
  showToast('Adicionado ao carrinho! ✅', 'success');
  setTimeout(() => {
    closeModal(null);
  }, 800);
}

function closeModal(event) {
  if (!event || event.target === document.getElementById('modalOverlay') || event.target.closest('.modal-close')) {
    document.getElementById('modalOverlay').classList.remove('active');
    document.body.style.overflow = '';
  }
}

// ==========================================
// RENDERIZAÇÃO DO CATÁLOGO (COM BANNER GRATIS)
// ==========================================
function renderCatalog(series) {
  const grid = document.getElementById('catalogGrid');
  grid.innerHTML = '';
  
  series.forEach(serie => {
    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = () => openModal(serie);
    
    const isFree = parseFloat(serie.price) === 0;
    
    // Badge GRATIS super visível ou preço normal
    const badgeHTML = isFree ? `
      <div class="badge-free-card">
        <i class="fas fa-star"></i> GRÁTIS
      </div>
    ` : `
      <span class="price-tag">R$ ${parseFloat(serie.price).toFixed(2)}</span>
    `;
    
    card.innerHTML = `
      ${badgeHTML}
      <img src="${serie.cover_url || ''}" 
           alt="${serie.title}" 
           loading="lazy"
           onload="this.classList.add('loaded')"
           onerror="this.style.opacity=1; this.style.background='#252525'">
      <div class="card-info">
        <div class="card-title">${serie.title || 'Sem título'}</div>
      </div>
    `;
    
    grid.appendChild(card);
  });
}

function filterCategory(category, element) {
  document.querySelectorAll('.category-chip').forEach(chip => chip.classList.remove('active'));
  element.classList.add('active');
  
  let filtered = allSeries;
  if (category !== 'all') {
    filtered = allSeries.filter(s => (s.category || '').toLowerCase() === category.toLowerCase());
  }
  
  renderCatalog(filtered);
}

function searchSeries(term) {
  const query = (term || '').toLowerCase().trim();
  if (!query) {
    renderCatalog(allSeries);
    return;
  }
  
  const filtered = allSeries.filter(s => 
    (s.title || '').toLowerCase().includes(query) ||
    (s.description || '').toLowerCase().includes(query)
  );
  
  renderCatalog(filtered);
}

// ==========================================
// SISTEMA DE TOASTS
// ==========================================
function showToast(message, type = 'info') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast toast-${type}`;
  
  const icons = {
    success: 'check-circle',
    error: 'exclamation-circle',
    info: 'info-circle'
  };
  
  toast.innerHTML = `
    <i class="fas fa-${icons[type]}" toast-icon></i>
    <span>${message}</span>
  `;
  
  container.appendChild(toast);
  
  requestAnimationFrame(() => {
    toast.classList.add('show');
  });
  
  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 300);
  }, 2800);
}

// Inicialização
init();

</script>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Séries Curtas Express</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* ==========================================
       7. TEMA DINÂMICO (Claro/Escuro)
       ========================================== */
    :root {
      --primary: #E50914;
      --primary-dark: #B20710;
      --dark: #141414;
      --darker: #0F0F0F;
      --gray: #808080;
      --light: #FFFFFF;
      --card-bg: #181818;
      --hover: #2F2F2F;
      --skeleton-base: #1a1a1a;
      --skeleton-highlight: #2a2a2a;
      --text-primary: #FFFFFF;
      --text-secondary: #e5e5e5;
      --bg-body: #0F0F0F;
    }
    
    /* Tema Claro */
    body.light-mode {
      --dark: #f5f5f5;
      --darker: #ffffff;
      --card-bg: #f0f0f0;
      --hover: #e0e0e0;
      --skeleton-base: #e0e0e0;
      --skeleton-highlight: #f0f0f0;
      --text-primary: #141414;
      --text-secondary: #333333;
      --bg-body: #f5f5f5;
    }
    
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    
    body {
      background: var(--bg-body);
      color: var(--text-primary);
      overflow-x: hidden;
      transition: background 0.3s, color 0.3s;
    }
    
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      padding: 15px 4%;
      background: linear-gradient(to bottom, rgba(0,0,0,0.9) 10%, transparent);
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.3s;
    }
    
    body.light-mode .header {
      background: linear-gradient(to bottom, rgba(255,255,255,0.9) 10%, transparent);
    }
    
    .header.scrolled {
      background: var(--darker);
      box-shadow: 0 2px 20px rgba(0,0,0,0.5);
    }
    
    body.light-mode .header.scrolled {
      background: var(--darker);
      box-shadow: 0 2px 20px rgba(0,0,0,0.1);
    }
    
    .logo {
      font-size: 24px;
      font-weight: 800;
      color: var(--primary);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .theme-toggle {
      background: rgba(255,255,255,0.1);
      border: none;
      color: var(--text-primary);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      transition: all 0.3s;
      backdrop-filter: blur(10px);
    }
    
    .theme-toggle:hover {
      transform: rotate(180deg);
      background: var(--primary);
      color: white;
    }
    
    /* ==========================================
       LAYOUT PRINCIPAL
       ========================================== */
    .hero {
      position: relative;
      height: 85vh;
      min-height: 600px;
      background: var(--darker);
      display: flex;
      align-items: center;
      padding: 80px 0 60px 4%;
      margin-bottom: 20px;
      overflow: hidden;
    }
    
    .hero-content {
      position: relative;
      z-index: 10;
      width: 40%;
      max-width: 550px;
      padding-right: 60px;
      animation: fadeInLeft 0.8s ease;
    }
    
    @keyframes fadeInLeft {
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    .hero-image-container {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 55%;
      height: 90%;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .hero-image {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      object-position: center center;
      transition: opacity 0.8s ease-in-out;
      image-rendering: -webkit-optimize-contrast;
      opacity: 0;
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    }
    
    .hero-image.active {
      opacity: 1;
    }
    
    .hero-gradient {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 55%;
      background: linear-gradient(to right, 
        var(--darker) 0%, 
        rgba(15,15,15,0.98) 25%,
        rgba(15,15,15,0.85) 45%,
        rgba(15,15,15,0.4) 60%,
        transparent 100%
      );
      z-index: 5;
      pointer-events: none;
    }
    
    body.light-mode .hero-gradient {
      background: linear-gradient(to right, 
        var(--darker) 0%, 
        rgba(255,255,255,0.98) 25%,
        rgba(255,255,255,0.85) 45%,
        rgba(255,255,255,0.4) 60%,
        transparent 100%
      );
    }
    
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(229, 9, 20, 0.9);
      color: white;
      padding: 8px 16px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 20px;
      letter-spacing: 1px;
      box-shadow: 0 4px 15px rgba(229, 9, 20, 0.3);
    }
    
    .hero h1 {
      font-size: 48px;
      font-weight: 800;
      margin-bottom: 20px;
      line-height: 1.1;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
      letter-spacing: -0.5px;
      color: var(--text-primary);
    }
    
    body.light-mode .hero h1 {
      text-shadow: none;
    }
    
    .hero-desc {
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 30px;
      color: var(--text-secondary);
      text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
    }
    
    body.light-mode .hero-desc {
      text-shadow: none;
    }
    
    .btn {
      padding: 14px 28px;
      border-radius: 6px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }
    
    .btn-primary {
      background: var(--light);
      color: var(--dark);
    }
    
    body.light-mode .btn-primary {
      background: var(--dark);
      color: var(--light);
    }
    
    .btn-secondary {
      background: rgba(255,255,255,0.2);
      color: var(--light);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.3);
    }
    
    body.light-mode .btn-secondary {
      background: rgba(0,0,0,0.1);
      color: var(--dark);
      border: 1px solid rgba(0,0,0,0.2);
    }
    
    .hero-controls {
      display: flex;
      gap: 12px;
      margin-top: 30px;
      align-items: center;
    }
    
    .hero-nav {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.5);
      color: var(--text-primary);
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    
    .hero-nav:hover {
      background: rgba(255,255,255,0.3);
      border-color: var(--primary);
    }
    
    .hero-dots {
      display: flex;
      gap: 8px;
      margin-left: 15px;
    }
    
    .hero-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(128,128,128,0.5);
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .hero-dot.active {
      background: var(--primary);
      width: 28px;
      border-radius: 5px;
    }
    
    /* ==========================================
       1. SKELETON LOADING
       ========================================== */
    .skeleton {
      background: linear-gradient(90deg, var(--skeleton-base) 25%, var(--skeleton-highlight) 50%, var(--skeleton-base) 75%);
      background-size: 200% 100%;
      animation: skeleton-loading 1.5s infinite;
      border-radius: 8px;
    }
    
    @keyframes skeleton-loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    
    .skeleton-text {
      height: 20px;
      margin-bottom: 10px;
      border-radius: 4px;
    }
    
    .skeleton-title {
      height: 40px;
      margin-bottom: 20px;
      border-radius: 4px;
    }
    
    .skeleton-image {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }
    
    /* ==========================================
       2. MODAL DE DETALHES
       ========================================== */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(10px);
      z-index: 9999;
      display: none;
      justify-content: center;
      align-items: center;
      padding: 20px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    
    .modal-overlay.active {
      display: flex;
      opacity: 1;
    }
    
    .modal-content {
      background: var(--card-bg);
      border-radius: 16px;
      max-width: 900px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      transform: scale(0.9);
      transition: transform 0.3s;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }
    
    .modal-overlay.active .modal-content {
      transform: scale(1);
    }
    
    .modal-close {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(0,0,0,0.5);
      border: none;
      color: white;
      font-size: 20px;
      cursor: pointer;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }
    
    .modal-close:hover {
      background: var(--primary);
      transform: rotate(90deg);
    }
    
    .modal-hero {
      position: relative;
      height: 400px;
      background: var(--skeleton-base);
      overflow: hidden;
    }
    
    .modal-hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .modal-gradient {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 200px;
      background: linear-gradient(to top, var(--card-bg), transparent);
    }
    
    .modal-body {
      padding: 30px;
      margin-top: -100px;
      position: relative;
      z-index: 2;
    }
    
    .modal-title {
      font-size: 36px;
      font-weight: 800;
      margin-bottom: 15px;
      color: var(--text-primary);
    }
    
    .modal-meta {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    
    .modal-meta span {
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--text-secondary);
      font-size: 14px;
    }
    
    .modal-price {
      font-size: 24px;
      color: #4CAF50;
      font-weight: 700;
    }
    
    .modal-price.free {
      color: var(--primary);
    }
    
    .modal-desc {
      font-size: 16px;
      line-height: 1.7;
      color: var(--text-secondary);
      margin-bottom: 30px;
    }
    
    .modal-actions {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }
    
    .btn-large {
      padding: 16px 32px;
      font-size: 18px;
    }
    
    .btn-outline {
      background: transparent;
      border: 2px solid var(--text-primary);
      color: var(--text-primary);
    }
    
    .btn-outline:hover {
      background: var(--text-primary);
      color: var(--dark);
    }
    
    /* ==========================================
       8. TOAST NOTIFICATIONS
       ========================================== */
    .toast-container {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10000;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }
    
    .toast {
      background: rgba(30,30,30,0.95);
      color: white;
      padding: 16px 24px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 500;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      min-width: 300px;
      pointer-events: all;
    }
    
    body.light-mode .toast {
      background: rgba(255,255,255,0.95);
      color: #141414;
      border: 1px solid rgba(0,0,0,0.1);
    }
    
    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }
    
    .toast-icon {
      font-size: 20px;
      color: var(--primary);
    }
    
    .toast-success .toast-icon {
      color: #4CAF50;
    }
    
    /* ==========================================
       9. OFFLINE MODE
       ========================================== */
    .offline-banner {
      position: fixed;
      top: 70px;
      left: 0;
      right: 0;
      background: #ff9800;
      color: #000;
      text-align: center;
      padding: 12px;
      font-weight: 600;
      z-index: 9998;
      transform: translateY(-100%);
      transition: transform 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    
    .offline-banner.show {
      transform: translateY(0);
    }
    
    body.offline .offline-banner {
      transform: translateY(0);
    }
    
    /* ==========================================
       CATÁLOGO
       ========================================== */
    .section {
      padding: 20px 4%;
      margin-bottom: 30px;
    }
    
    .section-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 20px;
      color: var(--text-primary);
    }
    
    .movies-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 18px;
    }
    
    .movie-card {
      position: relative;
      background: var(--card-bg);
      border-radius: 8px;
      overflow: hidden;
      transition: all 0.3s;
      cursor: pointer;
      aspect-ratio: 2/3;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
    
    .movie-card:hover {
      transform: scale(1.05);
      z-index: 10;
      box-shadow: 0 15px 35px rgba(0,0,0,0.6);
    }
    
    .movie-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.3s;
    }
    
    .movie-image.loaded {
      opacity: 1;
    }
    
    .price-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.85);
      color: #4CAF50;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      z-index: 5;
    }
    
    .price-badge.free {
      color: #FFD700;
      background: rgba(229, 9, 20, 0.9);
    }
    
    .movie-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 60px 15px 15px;
      background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }
    
    .movie-card:hover .movie-info {
      opacity: 1;
    }
    
    .movie-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 5px;
      color: white;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    .categories-scroll {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding: 10px 0;
      margin-bottom: 20px;
    }
    
    .category-chip {
      padding: 10px 20px;
      background: rgba(128,128,128,0.1);
      border: 1px solid rgba(128,128,128,0.2);
      border-radius: 25px;
      color: var(--text-primary);
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.3s;
    }
    
    .category-chip:hover, .category-chip.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }
    
    .search-box {
      position: relative;
      max-width: 600px;
      margin: 0 auto 25px;
    }
    
    .search-box input {
      width: 100%;
      padding: 16px 24px 16px 50px;
      background: rgba(128,128,128,0.1);
      border: 1px solid rgba(128,128,128,0.2);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 16px;
      outline: none;
    }
    
    .search-box input::placeholder {
      color: var(--gray);
    }
    
    .search-box i {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray);
    }
    
    @media (max-width: 968px) {
      .hero { flex-direction: column; height: auto; min-height: auto; padding: 100px 4% 40px; }
      .hero-content { width: 100%; padding-right: 0; margin-bottom: 30px; text-align: center; }
      .hero-image-container { position: relative; width: 100%; height: 500px; transform: none; top: auto; }
      .hero-image { max-height: 500px; }
      .hero-gradient { display: none; }
      .hero h1 { font-size: 36px; }
      .hero-controls { justify-content: center; }
      .modal-hero { height: 250px; }
      .modal-title { font-size: 28px; }
    }
    
    @media (max-width: 768px) {
      .hero-image-container { height: 400px; }
      .hero h1 { font-size: 28px; }
      .toast { min-width: 90%; }
    }
  </style>
</head>
<body>
  <!-- 9. Offline Banner -->
  <div class="offline-banner" id="offline-banner">
    <i class="fas fa-wifi-slash"></i>
    Você está offline. Exibindo catálogo salvo.
  </div>

  <header class="header" id="header">
    <a href="#" class="logo">
      <i class="fas fa-play-circle"></i>
      SÉRIES CURTAS
    </a>
    <button class="theme-toggle" onclick="toggleTheme()" title="Alternar tema">
      <i class="fas fa-moon" id="theme-icon"></i>
    </button>
  </header>

  <!-- Hero Section -->
  <section class="hero" id="hero-section">
    <div class="hero-gradient"></div>
    
    <div class="hero-content" id="hero-content">
      <span class="hero-badge">
        <i class="fas fa-fire"></i>
        Destaque da Semana
      </span>
      <h1 id="hero-title">Carregando...</h1>
      <p class="hero-desc" id="hero-desc">
        As melhores séries curtas estão aqui. Compre e assista instantaneamente!
      </p>
      <div style="display: flex; gap: 12px; flex-wrap: wrap;">
        <button class="btn btn-primary" onclick="buyFeatured()">
          <i class="fas fa-play"></i>
          Comprar Agora
        </button>
        <button class="btn btn-secondary" onclick="scrollToGrid()">
          <i class="fas fa-list"></i>
          Ver Catálogo
        </button>
      </div>
      
      <div class="hero-controls">
        <button onclick="prevHero()" class="hero-nav"><i class="fas fa-chevron-left"></i></button>
        <div class="hero-dots" id="hero-dots"></div>
        <button onclick="nextHero()" class="hero-nav"><i class="fas fa-chevron-right"></i></button>
      </div>
    </div>
    
    <div class="hero-image-container">
      <img id="hero-img" class="hero-image" src="" alt="Banner">
    </div>
  </section>

  <div style="padding: 0 4%;">
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="Buscar séries..." onkeyup="searchSeries(this.value)">
    </div>
  </div>

  <div class="section">
    <div class="categories-scroll">
      <div class="category-chip active" onclick="filterCategory('all')">Todas</div>
      <div class="category-chip" onclick="filterCategory('romance')">❤️ Romance</div>
      <div class="category-chip" onclick="filterCategory('drama')">🎭 Drama</div>
      <div class="category-chip" onclick="filterCategory('suspense')">🔪 Suspense</div>
    </div>
    
    <h2 class="section-title">Catálogo Completo</h2>
    <div class="movies-grid" id="movies-grid">
      <!-- Skeleton Loading inicial -->
      <div class="movie-card skeleton"></div>
      <div class="movie-card skeleton"></div>
      <div class="movie-card skeleton"></div>
      <div class="movie-card skeleton"></div>
      <div class="movie-card skeleton"></div>
      <div class="movie-card skeleton"></div>
    </div>
  </div>

  <!-- 2. Modal de Detalhes -->
  <div class="modal-overlay" id="modal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeModal()">
        <i class="fas fa-times"></i>
      </button>
      
      <div class="modal-hero">
        <img id="modal-img" src="" alt="">
        <div class="modal-gradient"></div>
      </div>
      
      <div class="modal-body">
        <h2 class="modal-title" id="modal-title">Título</h2>
        
        <div class="modal-meta">
          <span><i class="fas fa-tag"></i> <span id="modal-category">Categoria</span></span>
          <span><i class="fas fa-clock"></i> Curta</span>
          <span class="modal-price" id="modal-price">R$ 0,00</span>
        </div>
        
        <p class="modal-desc" id="modal-desc">
          Descrição da série...
        </p>
        
        <div class="modal-actions">
          <button class="btn btn-primary btn-large" onclick="buyFromModal()">
            <i class="fas fa-shopping-cart"></i>
            Comprar Agora
          </button>
          <button class="btn btn-outline btn-large" onclick="closeModal()">
            <i class="fas fa-times"></i>
            Fechar
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- 8. Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    
    const API_URL = 'https://uyyeascxvnrkjtlygdoe.supabase.co/functions/v1/bot-unificado/api/series';
    let allSeries = [];
    let featuredSeries = null;
    let currentHeroIndex = 0;
    let heroInterval;
    let currentModalSeries = null;
    
    const placeholderImages = {
      default: 'https://images.unsplash.com/photo-1440404653325-ab127d49abc1?w=1920&q=90'
    };
    
    // ==========================================
    // 7. TEMA DINÂMICO
    // ==========================================
    function initTheme() {
      const savedTheme = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      
      if (savedTheme === 'light' || (!savedTheme && !prefersDark)) {
        document.body.classList.add('light-mode');
        document.getElementById('theme-icon').classList.replace('fa-moon', 'fa-sun');
      }
    }
    
    function toggleTheme() {
      const isLight = document.body.classList.toggle('light-mode');
      const icon = document.getElementById('theme-icon');
      
      if (isLight) {
        icon.classList.replace('fa-moon', 'fa-sun');
        localStorage.setItem('theme', 'light');
        showToast('Tema claro ativado', 'info');
      } else {
        icon.classList.replace('fa-sun', 'fa-moon');
        localStorage.setItem('theme', 'dark');
        showToast('Tema escuro ativado', 'info');
      }
    }
    
    // ==========================================
    // 9. OFFLINE DETECTION
    // ==========================================
    window.addEventListener('online', () => {
      document.body.classList.remove('offline');
      showToast('Conexão restaurada!', 'success');
      loadSeries(); // Recarrega dados frescos
    });
    
    window.addEventListener('offline', () => {
      document.body.classList.add('offline');
      showToast('Você está offline', 'error');
    });
    
    // Verifica estado inicial
    if (!navigator.onLine) {
      document.body.classList.add('offline');
    }
    
    // ==========================================
    // 8. TOAST NOTIFICATIONS
    // ==========================================
    function showToast(message, type = 'info') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      
      const icons = {
        success: 'fa-check-circle',
        error: 'fa-exclamation-circle',
        info: 'fa-info-circle'
      };
      
      toast.className = `toast toast-${type}`;
      toast.innerHTML = `
        <i class="fas ${icons[type]} toast-icon"></i>
        <span>${message}</span>
      `;
      
      container.appendChild(toast);
      
      // Anima entrada
      setTimeout(() => toast.classList.add('show'), 10);
      
      // Remove após 3 segundos
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 400);
      }, 3000);
    }
    
    // ==========================================
    // 10. ANALYTICS (Tracking)
    // ==========================================
    async function trackEvent(eventType, seriesId, seriesTitle) {
      try {
        // Aqui você pode enviar para seu backend
        // Exemplo: await fetch(`${API_URL}/track`, { method: 'POST', body: JSON.stringify({...}) })
        
        console.log('[Analytics]', { event: eventType, id: seriesId, title: seriesTitle, timestamp: new Date().toISOString() });
        
        // Se quiser implementar no Supabase depois, descomente:
        /*
        await fetch('https://uyyeascxvnrkjtlygdoe.supabase.co/functions/v1/bot-unificado/api/track', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            event: eventType,
            series_id: seriesId,
            user_id: tg.initDataUnsafe?.user?.id || 'anonymous',
            timestamp: new Date().toISOString()
          })
        });
        */
      } catch (e) {
        console.error('Erro ao tracking:', e);
      }
    }
    
    // ==========================================
    // 2. MODAL FUNCTIONS
    // ==========================================
    function openModal(serie) {
      currentModalSeries = serie;
      
      document.getElementById('modal-img').src = serie.cover_url || placeholderImages.default;
      document.getElementById('modal-title').textContent = serie.title;
      document.getElementById('modal-category').textContent = serie.category || 'Série';
      document.getElementById('modal-desc').textContent = serie.description || 'Uma história emocionante que vai prender você do início ao fim.';
      
      const priceEl = document.getElementById('modal-price');
      if (serie.price == 0) {
        priceEl.textContent = 'GRÁTIS';
        priceEl.classList.add('free');
      } else {
        priceEl.textContent = `R$ ${serie.price}`;
        priceEl.classList.remove('free');
      }
      
      document.getElementById('modal').classList.add('active');
      document.body.style.overflow = 'hidden';
      
      // Tracking
      trackEvent('view_details', serie.id, serie.title);
    }
    
    function closeModal(event) {
      if (!event || event.target.id === 'modal' || event.target.closest('.modal-close')) {
        document.getElementById('modal').classList.remove('active');
        document.body.style.overflow = '';
      }
    }
    
    function buyFromModal() {
      if (currentModalSeries) {
        closeModal();
        buy(currentModalSeries.id, currentModalSeries.title, currentModalSeries.price);
      }
    }
    
    // ==========================================
    // HERO SLIDESHOW
    // ==========================================
    function updateHeroBackground() {
      const heroImg = document.getElementById('hero-img');
      const heroTitle = document.getElementById('hero-title');
      const heroDesc = document.getElementById('hero-desc');
      
      if (!allSeries.length || !heroImg) return;
      
      const serie = allSeries[currentHeroIndex];
      const imageUrl = serie.cover_url || placeholderImages.default;
      
      heroImg.classList.remove('active');
      
      setTimeout(() => {
        heroImg.src = imageUrl;
        heroImg.onload = () => {
          heroImg.classList.add('active');
        };
      }, 300);
      
      heroTitle.style.opacity = '0';
      heroDesc.style.opacity = '0';
      
      setTimeout(() => {
        heroTitle.textContent = serie.title;
        heroDesc.textContent = serie.description || 'Uma história emocionante que vai prender você do início ao fim.';
        heroTitle.style.opacity = '1';
        heroDesc.style.opacity = '1';
      }, 300);
      
      featuredSeries = serie;
      updateHeroDots();
    }
    
    function updateHeroDots() {
      const dotsContainer = document.getElementById('hero-dots');
      if (!dotsContainer) return;
      
      dotsContainer.innerHTML = allSeries.map((_, index) => 
        `<div class="hero-dot ${index === currentHeroIndex ? 'active' : ''}" onclick="goToHero(${index})"></div>`
      ).join('');
    }
    
    function startHeroSlideshow() {
      if (heroInterval) clearInterval(heroInterval);
      updateHeroBackground();
      heroInterval = setInterval(nextHero, 6000);
    }
    
    function nextHero() {
      currentHeroIndex = (currentHeroIndex + 1) % allSeries.length;
      updateHeroBackground();
    }
    
    function prevHero() {
      currentHeroIndex = (currentHeroIndex - 1 + allSeries.length) % allSeries.length;
      updateHeroBackground();
      resetTimer();
    }
    
    function goToHero(index) {
      currentHeroIndex = index;
      updateHeroBackground();
      resetTimer();
    }
    
    function resetTimer() {
      if (heroInterval) {
        clearInterval(heroInterval);
        heroInterval = setInterval(nextHero, 6000);
      }
    }
    
    // ==========================================
    // CARREGAR DADOS COM SKELETON
    // ==========================================
    async function loadSeries() {
      try {
        // Mostra skeleton no hero enquanto carrega
        document.getElementById('hero-title').innerHTML = '<div class="skeleton skeleton-title" style="width: 80%;"></div>';
        document.getElementById('hero-desc').innerHTML = '<div class="skeleton skeleton-text" style="width: 100%;"></div><div class="skeleton skeleton-text" style="width: 60%;"></div>';
        
        const res = await fetch(API_URL);
        if (!res.ok) throw new Error('Erro na API');
        
        allSeries = await res.json();
        
        // Restaura textos e inicia slideshow
        document.getElementById('hero-title').textContent = 'Carregando...';
        document.getElementById('hero-desc').textContent = 'As melhores séries curtas estão aqui. Compre e assista instantaneamente!';
        
        startHeroSlideshow();
        renderGrid(allSeries);
        showToast('Catálogo carregado!', 'success');
        
      } catch (e) {
        console.error('Erro:', e);
        showToast('Erro ao carregar séries. Tente recarregar.', 'error');
        document.getElementById('movies-grid').innerHTML = 
          '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #666;">' +
          '<i class="fas fa-exclamation-circle" style="font-size: 48px; margin-bottom: 15px;"></i>' +
          '<p>Erro ao carregar séries. <button onclick="loadSeries()" style="background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin-top: 10px;">Tentar novamente</button></p></div>';
      }
    }
    
    // ==========================================
    // RENDER GRID
    // ==========================================
    function renderGrid(series) {
      const grid = document.getElementById('movies-grid');
      if (!series || !series.length) {
        grid.innerHTML = '<p style="color: #666; text-align: center; grid-column: 1/-1;">Nenhuma série encontrada</p>';
        return;
      }
      
      grid.innerHTML = series.map((s) => {
        const isFree = s.price == 0;
        const priceText = isFree ? 'GRÁTIS' : `R$ ${s.price}`;
        const priceClass = isFree ? 'free' : '';
        const imgUrl = s.cover_url || placeholderImages.default;
        
        return `
          <div class="movie-card" onclick="handleCardClick('${s.id}', '${s.title.replace(/'/g, "\\'")}', ${s.price}, '${s.category || 'Série'}', '${s.description ? s.description.replace(/'/g, "\\'").replace(/"/g, '&quot;') : ''}', '${imgUrl}')">
            <img src="${imgUrl}" class="movie-image" alt="${s.title}" loading="lazy" onload="this.classList.add('loaded')" onerror="this.style.opacity='1'">
            <span class="price-badge ${priceClass}">${priceText}</span>
            <div class="movie-info">
              <h3 class="movie-title">${s.title}</h3>
            </div>
          </div>
        `;
      }).join('');
    }
    
    // Handler para clique no card (abre modal em vez de comprar direto)
    function handleCardClick(id, title, price, category, description, coverUrl) {
      const serie = { id, title, price, category, description, cover_url: coverUrl };
      openModal(serie);
      trackEvent('click_card', id, title);
    }
    
    function filterCategory(cat) {
      document.querySelectorAll('.category-chip').forEach(chip => chip.classList.remove('active'));
      event.target.classList.add('active');
      
      if (cat === 'all') renderGrid(allSeries);
      else {
        const filtered = allSeries.filter(s => s.category === cat || s.title.toLowerCase().includes(cat));
        renderGrid(filtered);
        showToast(`${filtered.length} séries encontradas`, 'info');
      }
    }
    
    function searchSeries(term) {
      if (!term) {
        renderGrid(allSeries);
        return;
      }
      
      const filtered = allSeries.filter(s => 
        s.title.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '')
          .includes(term.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, ''))
      );
      renderGrid(filtered);
    }
    
    function buy(id, title, price) {
      trackEvent('buy_click', id, title);
      tg.sendData(JSON.stringify({ action: 'buy', series_id: id, title, price }));
      tg.close();
    }
    
    function buyFeatured() {
      if (featuredSeries) {
        trackEvent('buy_featured', featuredSeries.id, featuredSeries.title);
        buy(featuredSeries.id, featuredSeries.title, featuredSeries.price);
      }
    }
    
    function scrollToGrid() {
      window.scrollTo({ top: document.querySelector('.section').offsetTop - 100, behavior: 'smooth' });
    }
    
    // Header scroll effect
    window.addEventListener('scroll', () => {
      const header = document.getElementById('header');
      if (window.scrollY > 50) header.classList.add('scrolled');
      else header.classList.remove('scrolled');
    });
    
    // Inicialização
    initTheme();
    loadSeries();
  </script>
</body>
</html>

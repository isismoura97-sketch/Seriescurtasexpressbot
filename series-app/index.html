<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Séries Curtas Express</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #E50914;
      --primary-dark: #B20710;
      --dark: #141414;
      --darker: #0F0F0F;
      --gray: #808080;
      --card-bg: #181818;
      --success: #4CAF50;
      --gold: #FFD700;
      --text-main: #FFFFFF;
      --text-dim: #E5E5E5;
      --bg-body: #0F0F0F;
    }
    body.light-mode {
      --dark: #f5f5f5; --darker: #ffffff; --card-bg: #f0f0f0; --text-main: #141414; --text-dim: #333333; --bg-body: #f5f5f5;
    }

    * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
    html, body { width:100%; height:100%; background:var(--bg-body); color:var(--text-main); overflow-x:hidden; }

    /* ==================== PLAYER ==================== */
    .player-overlay { position:fixed; inset:0; background:#000; z-index:10000; display:none; flex-direction:column; }
    .player-overlay.active { display:flex; }
    .player-header { position:absolute; top:0; left:0; right:0; z-index:20; padding:12px 16px; background:linear-gradient(180deg,#000 0%,transparent 100%); display:flex; align-items:center; justify-content:space-between; }
    .btn-back { background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.3); color:#fff; border-radius:20px; padding:8px 16px; font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:6px; }
    .btn-back:hover { background:var(--primary); }
    .btn-close-player { background:transparent; border:none; color:#fff; width:36px; height:36px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:18px; }
    .player-body { flex:1; position:relative; }
    video { width:100%; height:auto; max-height:85vh; object-fit:contain; background:#000; }

    .player-state { position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; background:#000; z-index:15; gap:16px; text-align:center; padding:20px; }
    .player-state.active { display:flex; }
    .spinner { width:45px; height:45px; border:4px solid rgba(255,255,255,0.1); border-top-color:var(--primary); border-radius:50%; animation:spin 1s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .error-icon { font-size:52px; color:#ff4444; }
    .btn-retry, .btn-test { padding:12px 24px; border-radius:8px; font-weight:700; cursor:pointer; margin:5px; }
    .btn-retry { background:var(--primary); color:white; border:none; }
    .btn-test { background:#4CAF50; color:white; border:none; }

    /* ==================== HEADER ==================== */
    .header { position:fixed; top:0; left:0; right:0; z-index:1000; padding:12px 16px; display:flex; justify-content:space-between; align-items:center; background:linear-gradient(to bottom,rgba(0,0,0,0.95),transparent); transition:all 0.3s; }
    .header.scrolled { background:var(--darker); box-shadow:0 2px 20px rgba(0,0,0,0.8); }
    .logo { font-size:19px; font-weight:800; color:var(--primary); text-decoration:none; display:flex; align-items:center; gap:8px; }
    .icon-btn { background:rgba(255,255,255,0.1); border:none; color:var(--text-main); width:40px; height:40px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; position:relative; font-size:17px; }
    .icon-btn:hover { background:var(--primary); transform:scale(1.05); }
    .badge { position:absolute; top:-4px; right:-4px; background:var(--primary); color:white; font-size:10px; font-weight:700; width:20px; height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:2px solid var(--darker); }

    /* ==================== HERO - POSTER MENOR E MAIS PARA A ESQUERDA ==================== */
    .hero { position:relative; min-height:85svh; overflow:hidden; background:var(--darker); }
    .hero-slide { position:absolute; inset:0; display:flex; align-items:center; padding:90px 20px 40px; gap:30px; opacity:0; transition:all 0.8s ease; pointer-events:none; }
    .hero-slide.active { opacity:1; pointer-events:auto; }
    .hero-bg { position:absolute; inset:0; background-size:cover; background-position:center; filter:brightness(0.45); z-index:0; }
    .hero-gradient { position:absolute; left:0; top:0; bottom:0; width:72%; background:linear-gradient(to right,var(--darker) 0%, rgba(15,15,15,0.95) 58%, transparent 100%); z-index:1; }
    .hero-content { position:relative; z-index:2; width:58%; max-width:560px; }
    .hero-badge-free { display:inline-flex; align-items:center; gap:6px; background:linear-gradient(135deg,#FFD700,#FFA500); color:#000; padding:8px 16px; border-radius:25px; font-size:11px; font-weight:900; text-transform:uppercase; box-shadow:0 4px 15px rgba(255,215,0,0.5); animation:pulseGold 2s infinite; }
    @keyframes pulseGold { 0%,100% { box-shadow:0 4px 15px rgba(255,215,0,0.5); } 50% { box-shadow:0 4px 25px rgba(255,215,0,0.8); } }
    .hero h1 { font-size:clamp(28px,5vw,46px); font-weight:900; line-height:1.05; margin-bottom:12px; }
    .hero-desc { font-size:15px; color:var(--text-dim); line-height:1.5; margin-bottom:20px; }
    .btn { padding:14px 24px; border-radius:8px; border:none; font-size:14px; font-weight:700; cursor:pointer; display:inline-flex; align-items:center; gap:8px; transition:all 0.2s; }
    .btn:hover { transform:translateY(-2px); }
    .btn-primary { background:white; color:var(--dark); }
    .btn-play { background:var(--primary); color:white; }
    .btn-free { background:linear-gradient(135deg,#FFD700,#FFA500); color:#000; font-weight:900; animation:pulseGold 2s infinite; }

    /* POSTER MENOR E MAIS PARA A ESQUERDA */
    .hero-poster { 
      position:absolute; 
      right:12%; 
      top:52%; 
      transform:translateY(-50%); 
      width:29%; 
      max-width:260px; 
      border-radius:12px; 
      overflow:hidden; 
      box-shadow:0 25px 50px rgba(0,0,0,0.7); 
      z-index:3; 
    }
    .hero-poster img { width:100%; height:100%; object-fit:cover; opacity:0.3; transition:opacity 0.6s; }
    .hero-poster img.loaded { opacity:1; }

    .hero-indicators { position:absolute; bottom:30px; left:50%; transform:translateX(-50%); display:flex; gap:8px; z-index:10; }
    .indicator { width:9px; height:9px; border-radius:50%; background:rgba(255,255,255,0.4); cursor:pointer; transition:all 0.3s; }
    .indicator.active { background:var(--primary); width:28px; border-radius:6px; }

    /* ==================== CATÁLOGO ==================== */
    .section { padding:32px 16px 80px; }
    .search-box { position:relative; margin-bottom:20px; }
    .search-box input { width:100%; padding:14px 20px 14px 46px; background:rgba(128,128,128,0.15); border:1px solid rgba(128,128,128,0.2); border-radius:12px; color:var(--text-main); font-size:15px; }
    .search-box i { position:absolute; left:18px; top:50%; transform:translateY(-50%); color:var(--gray); }
    .categories { display:flex; gap:8px; margin-bottom:24px; overflow-x:auto; padding-bottom:8px; scrollbar-width:none; }
    .categories::-webkit-scrollbar { display:none; }
    .chip { padding:8px 18px; background:rgba(128,128,128,0.15); border:1px solid rgba(128,128,128,0.2); border-radius:20px; color:var(--text-main); font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; transition:all 0.2s; }
    .chip.active { background:var(--primary); color:white; border-color:var(--primary); }
    .section-title { font-size:22px; font-weight:800; margin-bottom:20px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:14px; }
    .card { background:var(--card-bg); border-radius:12px; overflow:hidden; cursor:pointer; position:relative; aspect-ratio:2/3; transition:all 0.25s; }
    .card:hover { transform:scale(1.04); box-shadow:0 15px 35px rgba(0,0,0,0.6); }
    .card img { width:100%; height:100%; object-fit:cover; opacity:0.3; transition:opacity 0.6s; background:#252525; }
    .card img.loaded { opacity:1; }
    .badge-gratis { position:absolute; top:10px; left:10px; z-index:5; background:linear-gradient(135deg,#FFD700,#FFA500); color:#000; font-weight:900; font-size:10px; padding:6px 10px; border-radius:6px; display:flex; align-items:center; gap:4px; box-shadow:0 3px 12px rgba(255,215,0,0.5); animation:pulseGold 2s infinite; }
    .price-tag { position:absolute; top:10px; right:10px; z-index:5; background:rgba(0,0,0,0.85); color:var(--success); padding:5px 9px; border-radius:6px; font-size:11px; font-weight:800; }
    .card-info { position:absolute; bottom:0; left:0; right:0; padding:40px 12px 12px; background:linear-gradient(to top,rgba(0,0,0,0.9),transparent); opacity:0; transition:opacity 0.3s; }
    .card:hover .card-info { opacity:1; }
    .card-title { font-size:13px; font-weight:700; color:white; line-height:1.3; }

    /* ==================== MODAL, CARRINHO, TOAST ==================== */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:9997; display:none; align-items:center; justify-content:center; }
    .modal-overlay.active { display:flex; }
    .modal-content { background:var(--card-bg); border-radius:20px; width:92%; max-width:480px; max-height:90vh; overflow:auto; position:relative; }
    .modal-close { position:absolute; top:12px; right:12px; background:rgba(0,0,0,0.6); border:none; color:white; width:38px; height:38px; border-radius:50%; cursor:pointer; font-size:20px; z-index:10; }
    .modal-hero { height:240px; overflow:hidden; }
    .modal-hero img { width:100%; height:100%; object-fit:cover; }
    .modal-body { padding:24px; }
    .modal-title { font-size:24px; font-weight:800; margin-bottom:8px; }
    .free-badge-big { background:linear-gradient(135deg,#FFD700,#FFA500); color:#000; font-weight:900; padding:10px 20px; border-radius:30px; display:inline-flex; align-items:center; gap:8px; animation:pulseGold 2s infinite; }
    .modal-actions { display:flex; flex-direction:column; gap:12px; margin-top:16px; }

    .cart-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:9998; opacity:0; visibility:hidden; transition:0.3s; }
    .cart-overlay.active { opacity:1; visibility:visible; }
    .cart-drawer { position:fixed; top:0; right:-100%; width:90%; max-width:380px; height:100%; background:var(--card-bg); z-index:9999; transition:0.35s cubic-bezier(0.4,0,0.2,1); display:flex; flex-direction:column; box-shadow:-10px 0 40px rgba(0,0,0,0.6); }
    .cart-drawer.active { right:0; }
    .cart-header { padding:20px; border-bottom:1px solid rgba(128,128,128,0.25); display:flex; justify-content:space-between; align-items:center; background:var(--darker); }
    .cart-body { flex:1; overflow-y:auto; padding:16px; }
    .cart-item { display:flex; gap:12px; margin-bottom:12px; background:rgba(0,0,0,0.3); padding:12px; border-radius:10px; position:relative; }
    .cart-item img { width:55px; height:80px; object-fit:cover; border-radius:6px; }
    .cart-item-remove { position:absolute; top:10px; right:10px; background:none; border:none; color:#ff4444; cursor:pointer; font-size:14px; }

    .toast-container { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); z-index:10001; display:flex; flex-direction:column; gap:10px; width:calc(100% - 32px); max-width:360px; }
    .toast { background:rgba(30,30,30,0.96); color:white; padding:14px 20px; border-radius:12px; display:flex; align-items:center; gap:10px; font-weight:600; transform:translateY(20px); opacity:0; transition:all 0.3s; }
    .toast.show { transform:translateY(0); opacity:1; }
  </style>
</head>
<body>

<!-- PLAYER -->
<div class="player-overlay" id="playerOverlay">
  <div class="player-header">
    <button class="btn-back" onclick="closePlayer()"><i class="fas fa-arrow-left"></i> Voltar</button>
    <span id="playerTitle" style="color:white;font-weight:600;max-width:55%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
    <button class="btn-close-player" onclick="closePlayer()"><i class="fas fa-times"></i></button>
  </div>
  <div class="player-body">
    <div class="player-state active" id="loadingState">
      <div class="spinner"></div>
      <div>Gerando link seguro...</div>
    </div>
    <div class="player-state" id="errorState">
      <div class="error-icon"><i class="fas fa-video-slash"></i></div>
      <div class="error-text" id="errorText">Servidor Indisponível<br><small>Tente o vídeo de teste abaixo</small></div>
      <button class="btn-retry" onclick="retryPlayer()">Tentar Novamente</button>
      <button class="btn-test" onclick="loadTestVideo()">Usar Vídeo de Teste</button>
      <button class="btn-back" onclick="closePlayer()" style="margin-top:12px;background:transparent;border:1px solid #555;color:#ccc">Voltar ao Catálogo</button>
    </div>
    <video id="mainVideo" controls playsinline webkit-playsinline preload="auto" style="display:none"></video>
  </div>
</div>

<!-- CARRINHO -->
<div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-header">
    <h3><i class="fas fa-shopping-cart"></i> Seu Carrinho</h3>
    <button class="icon-btn" onclick="toggleCart()"><i class="fas fa-times"></i></button>
  </div>
  <div class="cart-body" id="cartItems"></div>
  <div class="cart-footer">
    <div class="cart-total"><span>Total:</span><span id="cartTotal">R$ 0,00</span></div>
    <button class="btn btn-play" style="width:100%" onclick="checkout()"><i class="fas fa-check"></i> Finalizar Compra</button>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
    <div class="modal-hero"><img id="modalImg" src="" alt=""></div>
    <div class="modal-body">
      <h2 class="modal-title" id="modalTitle"></h2>
      <div class="modal-price" id="modalPrice"></div>
      <p class="modal-desc" id="modalDesc"></p>
      <div class="modal-actions" id="modalActions"></div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<!-- HEADER -->
<header class="header" id="header">
  <a href="#" class="logo"><i class="fas fa-play-circle"></i> SÉRIES EXPRESS</a>
  <div class="header-actions">
    <button class="icon-btn" onclick="toggleTheme()"><i class="fa-moon" id="themeIcon"></i></button>
    <button class="icon-btn" onclick="toggleCart()"><i class="fa-shopping-cart"></i><span class="badge" id="cartBadge" style="display:none">0</span></button>
  </div>
</header>

<!-- HERO - POSTER MENOR E MAIS PARA A ESQUERDA -->
<section class="hero">
  <div id="heroContainer"></div>
  <div class="hero-indicators" id="heroIndicators"></div>
</section>

<!-- CATÁLOGO -->
<section class="section" id="catalogSection">
  <div class="search-box">
    <i class="fas fa-search"></i>
    <input type="text" id="searchInput" placeholder="Buscar séries..." onkeyup="searchSeries(this.value)">
  </div>
  <div class="categories">
    <div class="chip active" onclick="filterCategory('all',this)">Todas</div>
    <div class="chip" onclick="filterCategory('romance',this)">Romance</div>
    <div class="chip" onclick="filterCategory('drama',this)">Drama</div>
    <div class="chip" onclick="filterCategory('suspense',this)">Suspense</div>
  </div>
  <h2 class="section-title">Catálogo Completo</h2>
  <div class="grid" id="catalogGrid"></div>
</section>

<script>
// ====================== CONFIG ======================
const tg = window.Telegram.WebApp;
tg.expand();

const API_URL = 'https://uyyeascxvnrkjtlygdoe.supabase.co/functions/v1/bot-unificado';
const userId = tg.initDataUnsafe?.user?.id || 'anonymous';

let allSeries = [];
let cart = JSON.parse(localStorage.getItem('cart_series') || '[]');
let currentHero = 0;
let heroInterval = null;
let retryData = null;

// ====================== INIT ======================
async function init() {
  applyTheme();
  await loadSeries();
  updateCartUI();
}
init();

// ====================== TEMA ======================
function applyTheme() {
  if (localStorage.getItem('theme_series') === 'light') {
    document.body.classList.add('light-mode');
    document.getElementById('themeIcon').className = 'fas fa-sun';
  }
}
function toggleTheme() {
  const isLight = document.body.classList.toggle('light-mode');
  localStorage.setItem('theme_series', isLight ? 'light' : 'dark');
  document.getElementById('themeIcon').className = isLight ? 'fas fa-sun' : 'fas fa-moon';
  showToast(isLight ? 'Tema Claro Ativado' : 'Tema Escuro Ativado', 'success');
}

// ====================== CARREGAR SÉRIES ======================
async function loadSeries() {
  try {
    const res = await fetch(`${API_URL}/api/series`);
    allSeries = await res.json();
  } catch (e) {
    console.warn("API offline - usando dados de teste");
    allSeries = [
      {id:101, title:"A Prometida do Príncipe Vampiro", description:"Uma história sobrenatural de romance, mistério e paixão proibida.", price:0, category:"romance", cover_url:"https://picsum.photos/id/1015/800/1200"},
      {id:102, title:"Amor nas Sombras", description:"Romance intenso", price:0, category:"romance", cover_url:"https://picsum.photos/id/201/800/1200"},
      {id:103, title:"Contrato Mortal", description:"Suspense psicológico", price:9.9, category:"suspense", cover_url:"https://picsum.photos/id/301/800/1200"},
      {id:104, title:"Realeza Oculta", description:"Drama real", price:0, category:"drama", cover_url:"https://picsum.photos/id/401/800/1200"}
    ];
  }
  renderGrid(allSeries);
  initHeroSlider();
}

// ====================== HERO SLIDER ======================
function initHeroSlider() {
  const container = document.getElementById('heroContainer');
  const indicators = document.getElementById('heroIndicators');
  container.innerHTML = '';
  indicators.innerHTML = '';

  allSeries.slice(0, 5).forEach((serie, i) => {
    const isFree = parseFloat(serie.price) === 0;
    const slide = document.createElement('div');
    slide.className = `hero-slide ${i === 0 ? 'active' : ''}`;
    slide.innerHTML = `
      <div class="hero-bg" style="background-image:url('${serie.cover_url}')"></div>
      <div class="hero-gradient"></div>
      <div class="hero-content">
        ${isFree ? `<div class="hero-badge-free"><i class="fas fa-gift"></i> GRÁTIS</div>` : `<div class="hero-badge"><i class="fas fa-fire"></i> DESTAQUE</div>`}
        <h1>${serie.title}</h1>
        <p class="hero-desc">${serie.description}</p>
        <div style="display:flex;gap:12px;flex-wrap:wrap">
          <button class="btn btn-primary" onclick="scrollToCatalog()">Explorar</button>
          ${isFree ? 
            `<button class="btn btn-free" onclick="openPlayer(${serie.id}, '${encodeURIComponent(serie.title)}')">Assistir Grátis</button>` : 
            `<button class="btn btn-play" onclick="openModal(${JSON.stringify(serie).replace(/"/g,'&quot;')})">Ver Detalhes</button>`
          }
        </div>
      </div>
      <div class="hero-poster"><img src="${serie.cover_url}" alt="${serie.title}" onload="this.classList.add('loaded')" onerror="this.classList.add('loaded');this.style.background='#252525'"></div>
    `;
    container.appendChild(slide);

    const dot = document.createElement('div');
    dot.className = `indicator ${i===0?'active':''}`;
    dot.onclick = () => goToHeroSlide(i);
    indicators.appendChild(dot);
  });

  if (allSeries.length > 1) heroInterval = setInterval(nextHeroSlide, 5000);
}

function goToHeroSlide(index) {
  clearInterval(heroInterval);
  const slides = document.querySelectorAll('.hero-slide');
  const dots = document.querySelectorAll('.indicator');
  slides.forEach((s,i) => s.classList.toggle('active', i === index));
  dots.forEach((d,i) => d.classList.toggle('active', i === index));
  currentHero = index;
  heroInterval = setInterval(nextHeroSlide, 5000);
}

function nextHeroSlide() {
  const total = document.querySelectorAll('.hero-slide').length;
  goToHeroSlide((currentHero + 1) % total);
}

function scrollToCatalog() {
  document.getElementById('catalogSection').scrollIntoView({ behavior: 'smooth' });
}

// ====================== CATÁLOGO ======================
function renderGrid(series) {
  const grid = document.getElementById('catalogGrid');
  grid.innerHTML = series.map(s => {
    const isFree = parseFloat(s.price) === 0;
    return `
      <div class="card" onclick="openModal(${JSON.stringify(s).replace(/"/g,'&quot;')})">
        ${isFree ? `<div class="badge-gratis"><i class="fas fa-gift"></i> GRÁTIS</div>` : `<span class="price-tag">R$ ${parseFloat(s.price).toFixed(2)}</span>`}
        <img src="${s.cover_url}" loading="lazy" onload="this.classList.add('loaded')" onerror="this.classList.add('loaded');this.style.background='#252525'">
        <div class="card-info"><div class="card-title">${s.title}</div></div>
      </div>`;
  }).join('');
}

function filterCategory(cat, el) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderGrid(cat === 'all' ? allSeries : allSeries.filter(s => s.category === cat));
}

function searchSeries(term) {
  const filtered = term ? allSeries.filter(s => s.title.toLowerCase().includes(term.toLowerCase())) : allSeries;
  renderGrid(filtered);
}

// ====================== PLAYER ======================
function openPlayer(id, title) {
  retryData = {id, title: decodeURIComponent(title)};
  document.getElementById('playerTitle').textContent = retryData.title;
  document.getElementById('playerOverlay').classList.add('active');
  document.getElementById('loadingState').classList.add('active');
  document.getElementById('errorState').classList.remove('active');
  document.getElementById('mainVideo').style.display = 'none';
  attemptLoad();
}

async function attemptLoad() {
  try {
    const res = await fetch(`${API_URL}/api/stream/${retryData.id}?user_id=${userId}`);
    const data = await res.json();

    if (data.error) throw new Error(data.error);

    const url = data.url || data.video_url;
    if (!url) throw new Error("Sem URL");

    const video = document.getElementById('mainVideo');
    video.src = url;
    video.style.display = 'block';
    document.getElementById('loadingState').classList.remove('active');

    video.play().catch(() => showToast("Clique no vídeo para reproduzir", "info"));

  } catch (e) {
    console.error(e);
    document.getElementById('loadingState').classList.remove('active');
    document.getElementById('errorState').classList.add('active');
  }
}

function loadTestVideo() {
  const video = document.getElementById('mainVideo');
  video.src = "https://test-streams.mux.dev/x264_720p_1500kbps_30fps.mp4";
  video.style.display = 'block';
  document.getElementById('loadingState').classList.remove('active');
  document.getElementById('errorState').classList.remove('active');
  video.play().catch(() => {});
  showToast("Vídeo de teste carregado", "success");
}

function retryPlayer() {
  if (retryData) attemptLoad();
}

function closePlayer() {
  const video = document.getElementById('mainVideo');
  video.pause();
  video.src = '';
  document.getElementById('playerOverlay').classList.remove('active');
}

// ====================== MODAL ======================
function openModal(serie) {
  document.getElementById('modalImg').src = serie.cover_url || '';
  document.getElementById('modalTitle').textContent = serie.title;
  document.getElementById('modalDesc').textContent = serie.description || 'Sem descrição disponível.';

  const price = parseFloat(serie.price || 0);
  const priceDiv = document.getElementById('modalPrice');
  const actions = document.getElementById('modalActions');
  actions.innerHTML = '';

  if (price === 0) {
    priceDiv.innerHTML = `<div class="free-badge-big"><i class="fas fa-gift"></i> GRÁTIS</div>`;
    const btn = document.createElement('button');
    btn.className = 'btn btn-free';
    btn.style.width = '100%';
    btn.innerHTML = '<i class="fas fa-play-circle"></i> ASSISTIR AGORA';
    btn.onclick = () => { closeModal(); openPlayer(serie.id, encodeURIComponent(serie.title)); };
    actions.appendChild(btn);
  } else {
    priceDiv.innerHTML = `R$ ${price.toFixed(2)}`;
    const row = document.createElement('div');
    row.style.display = 'flex'; row.style.gap = '10px';
    row.innerHTML = `
      <button class="btn btn-outline" style="flex:1" onclick="addToCartFromModal(${serie.id});closeModal()">Adicionar ao Carrinho</button>
      <button class="btn btn-primary" style="flex:1" onclick="buyNow(${serie.id},'${serie.title}',${price})">Comprar Agora</button>
    `;
    actions.appendChild(row);
  }
  document.getElementById('modalOverlay').classList.add('active');
}

function addToCartFromModal(id) {
  const serie = allSeries.find(s => s.id === id);
  if (serie) addToCart(serie);
}

function buyNow(id, title, price) {
  tg.sendData(JSON.stringify({action:'buy', series_id:id, title, price}));
  tg.close();
}

function closeModal(e) {
  if (!e || e.target.id === 'modalOverlay') document.getElementById('modalOverlay').classList.remove('active');
}

// ====================== CARRINHO ======================
function toggleCart() {
  const drawer = document.getElementById('cartDrawer');
  const overlay = document.getElementById('cartOverlay');
  const active = drawer.classList.toggle('active');
  overlay.classList.toggle('active', active);
  document.body.style.overflow = active ? 'hidden' : '';
}

function addToCart(serie) {
  if (cart.find(i => i.id === serie.id)) return showToast('Já está no carrinho', 'error');
  cart.push(serie);
  localStorage.setItem('cart_series', JSON.stringify(cart));
  updateCartUI();
  showToast('Adicionado ao carrinho!', 'success');
}

function updateCartUI() {
  const container = document.getElementById('cartItems');
  const badge = document.getElementById('cartBadge');
  badge.textContent = cart.length;
  badge.style.display = cart.length ? 'flex' : 'none';

  let total = 0;
  if (!cart.length) {
    container.innerHTML = `<div style="text-align:center;padding:60px 20px;color:#888"><i class="fas fa-shopping-basket" style="font-size:48px;opacity:0.3;display:block;margin-bottom:12px"></i>Carrinho vazio</div>`;
  } else {
    container.innerHTML = cart.map(item => {
      total += parseFloat(item.price||0);
      return `<div class="cart-item">
        <img src="${item.cover_url}" onerror="this.src='https://via.placeholder.com/50'">
        <div class="cart-item-info">
          <div class="cart-item-title">${item.title}</div>
          <div class="cart-item-price">${parseFloat(item.price)===0?'GRÁTIS':'R$ '+parseFloat(item.price).toFixed(2)}</div>
        </div>
        <button class="cart-item-remove" onclick="removeFromCart(${item.id})"><i class="fas fa-trash"></i></button>
      </div>`;
    }).join('');
  }
  document.getElementById('cartTotal').textContent = total === 0 ? 'Grátis' : 'R$ ' + total.toFixed(2);
}

function removeFromCart(id) {
  cart = cart.filter(i => i.id !== id);
  localStorage.setItem('cart_series', JSON.stringify(cart));
  updateCartUI();
}

function checkout() {
  if (!cart.length) return showToast('Carrinho vazio', 'error');
  tg.sendData(JSON.stringify({action:'checkout_cart', items:cart, total:cart.reduce((a,b)=>a+parseFloat(b.price||0),0), user_id:userId}));
  showToast('Finalizando compra...', 'success');
  setTimeout(() => { cart = []; localStorage.setItem('cart_series','[]'); updateCartUI(); toggleCart(); tg.close(); }, 1200);
}

// ====================== TOAST ======================
function showToast(message, type = 'info') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast toast-${type}`;
  toast.innerHTML = `<i class="fas fa-${type==='success'?'check-circle':'info-circle'} toast-icon"></i><span>${message}</span>`;
  container.appendChild(toast);
  setTimeout(() => toast.classList.add('show'), 10);
  setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 400); }, 3000);
}
</script>

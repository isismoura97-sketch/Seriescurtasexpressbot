<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Séries Curtas Express</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #E50914;
      --dark: #141414;
      --darker: #0F0F0F;
      --card-bg: #181818;
      --text-main: #FFFFFF;
      --text-dim: #E5E5E5;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { background: var(--darker); color: var(--text-main); overflow-x: hidden; }
    
    /* PLAYER EM TELA CHEIA - PROTEGIDO */
    .video-player-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.95);
      z-index: 10000;
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    
    .video-player-overlay.active { display: flex; }
    
    .player-container {
      width: 100%;
      max-width: 1000px;
      position: relative;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    }
    
    video {
      width: 100%;
      height: auto;
      max-height: 80vh;
      display: block;
      /* Impede download em alguns navegadores */
      controlsList: nodownload;
    }
    
    /* Remove botão de download e picture-in-picture */
    video::-webkit-media-controls-enclosure {
      overflow: hidden;
    }
    video::-webkit-media-controls-panel {
      width: calc(100% + 30px);
    }
    
    .player-header {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 20px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }
    
    .player-title { font-size: 18px; font-weight: 600; }
    .player-close {
      background: rgba(255,255,255,0.1);
      border: none;
      color: white;
      width: 40px; height: 40px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 20px;
      backdrop-filter: blur(10px);
    }
    
    .player-watermark {
      position: absolute;
      bottom: 60px;
      right: 20px;
      background: rgba(0,0,0,0.6);
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      pointer-events: none;
      user-select: none;
    }
    
    .loading-player {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    
    .spinner {
      width: 50px; height: 50px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* RESTO DO CSS (mantenha o anterior) */
    .header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      padding: 15px 4%;
      display: flex; justify-content: space-between; align-items: center;
      background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
    }
    
    .logo { font-size: 22px; font-weight: 800; color: var(--primary); text-decoration: none; display: flex; align-items: center; gap: 8px; }
    
    .hero {
      position: relative; height: 85vh; min-height: 600px;
      display: flex; align-items: center;
      padding: 80px 4% 60px; background: var(--darker);
    }
    
    .hero-content { width: 45%; max-width: 600px; z-index: 10; position: relative; }
    .hero-image-container {
      position: absolute; right: 5%; top: 50%; transform: translateY(-50%);
      width: 50%; max-width: 600px; height: 80vh;
      display: flex; align-items: center; justify-content: center;
    }
    .hero-poster {
      max-width: 100%; max-height: 100%; border-radius: 12px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
      opacity: 0; transition: opacity 0.8s;
    }
    .hero-poster.active { opacity: 1; }
    .hero-gradient {
      position: absolute; left: 0; top: 0; bottom: 0; width: 60%; z-index: 5;
      background: linear-gradient(to right, var(--darker) 30%, transparent 100%);
    }
    
    .hero h1 { font-size: 48px; font-weight: 800; margin-bottom: 15px; }
    .hero-desc { font-size: 18px; color: var(--text-dim); margin-bottom: 25px; }
    
    .btn {
      padding: 14px 28px; border-radius: 6px; border: none; font-weight: 700;
      cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s;
    }
    .btn-primary { background: white; color: var(--dark); }
    .btn-play { background: var(--primary); color: white; margin-left: 10px; }
    .btn-play:hover { background: #b20710; }
    
    .section { padding: 20px 4%; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
    .card {
      background: var(--card-bg); border-radius: 8px; overflow: hidden;
      cursor: pointer; transition: 0.3s; position: relative; aspect-ratio: 2/3;
    }
    .card:hover { transform: scale(1.05); }
    .card img { width: 100%; height: 100%; object-fit: cover; }
    .card-info {
      position: absolute; bottom: 0; width: 100%; padding: 15px;
      background: linear-gradient(to top, black, transparent);
    }
    .price-tag {
      position: absolute; top: 10px; right: 10px;
      background: var(--primary); padding: 4px 10px; border-radius: 4px;
      font-size: 12px; font-weight: 700;
    }
    
    @media (max-width: 968px) {
      .hero { flex-direction: column; height: auto; padding-top: 80px; text-align: center; }
      .hero-content { width: 100%; margin-bottom: 30px; }
      .hero-image-container { position: relative; width: 80%; height: 400px; transform: none; right: auto; }
      .hero-gradient { display: none; }
      .hero h1 { font-size: 32px; }
      .player-container { border-radius: 0; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <a href="#" class="logo"><i class="fas fa-play-circle"></i> SÉRIES HD</a>
  </header>

  <!-- PLAYER PROTEGIDO (inicialmente oculto) -->
  <div class="video-player-overlay" id="playerOverlay">
    <div class="player-container">
      <div class="player-header">
        <div class="player-title" id="playerTitle">Carregando...</div>
        <button class="player-close" onclick="closePlayer()">
          <i class="fas fa-times"></i>
        </button>
      </div>
      
      <div class="loading-player" id="playerLoading">
        <div class="spinner"></div>
        <div>Verificando acesso...</div>
      </div>
      
      <video 
        id="mainVideo" 
        controls 
        controlsList="nodownload" 
        disablePictureInPicture
        style="display: none;"
      ></video>
      
      <div class="player-watermark" id="playerWatermark">
        ID: <span id="watermarkId">---</span> | Conteúdo Protegido
      </div>
    </div>
  </div>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-gradient"></div>
    <div class="hero-content">
      <h1 id="hero-title">Carregando...</h1>
      <p class="hero-desc" id="hero-desc">Aguarde...</p>
      <div>
        <button class="btn btn-primary" onclick="scrollToGrid()">
          <i class="fas fa-list"></i> CATÁLOGO
        </button>
        <button class="btn btn-play" id="heroPlayBtn" onclick="playHero()" style="display: none;">
          <i class="fas fa-play"></i> ASSISTIR
        </button>
      </div>
    </div>
    <div class="hero-image-container">
      <img id="hero-img" class="hero-poster" alt="Poster">
    </div>
  </section>

  <!-- CATÁLOGO -->
  <section class="section" id="grid-section">
    <h2 style="margin-bottom: 20px;">Catálogo</h2>
    <div class="grid" id="catalog-grid"></div>
  </section>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    
    const API_URL = 'https://uyyeascxvnrkjtlygdoe.supabase.co/functions/v1/bot-unificado';
    const userId = tg.initDataUnsafe?.user?.id || 'anonymous';
    
    let allSeries = [];
    let currentHero = 0;
    let currentVideoUrl = null; // Para invalidar se necessário

    // CARREGAR DADOS
    async function loadData() {
      try {
        const res = await fetch(`${API_URL}/api/series`);
        allSeries = await res.json();
        renderGrid();
        startHero();
      } catch (e) {
        console.error('Erro:', e);
      }
    }

    function renderGrid() {
      const grid = document.getElementById('catalog-grid');
      grid.innerHTML = allSeries.map(s => `
        <div class="card" onclick="showDetails('${s.id}')">
          <span class="price-tag">${s.price == 0 ? 'GRÁTIS' : 'R$ '+s.price}</span>
          <img src="${s.cover_url}" alt="${s.title}" loading="lazy" onload="this.style.opacity=1" style="opacity:0; transition:0.3s;">
          <div class="card-info">
            <div style="font-weight: 700; font-size: 14px;">${s.title}</div>
          </div>
        </div>
      `).join('');
    }

    function startHero() {
      if(!allSeries.length) return;
      updateHero(0);
      setInterval(() => {
        currentHero = (currentHero + 1) % allSeries.length;
        updateHero(currentHero);
      }, 6000);
    }

    function updateHero(index) {
      const s = allSeries[index];
      document.getElementById('hero-title').innerText = s.title;
      document.getElementById('hero-desc').innerText = s.description || 'Clique para assistir';
      document.getElementById('hero-img').src = s.cover_url;
      document.getElementById('hero-img').classList.add('active');
      
      // Mostra botão de play se for gratuito ou se verificar compra (simplificado aqui)
      document.getElementById('heroPlayBtn').style.display = 'inline-flex';
      document.getElementById('heroPlayBtn').onclick = () => openPlayer(s.id, s.title);
    }

    // PLAYER PROTEGIDO
    async function openPlayer(serieId, title) {
      const overlay = document.getElementById('playerOverlay');
      const loading = document.getElementById('playerLoading');
      const video = document.getElementById('mainVideo');
      const watermark = document.getElementById('watermarkId');
      
      overlay.classList.add('active');
      loading.style.display = 'block';
      video.style.display = 'none';
      document.getElementById('playerTitle').innerText = title || 'Carregando...';
      watermark.innerText = userId;
      
      try {
        // Busca URL assinada do backend (válida por 30 min)
        const res = await fetch(`${API_URL}/api/stream/${serieId}?user_id=${userId}`);
        const data = await res.json();
        
        if (data.error) {
          alert(data.error);
          closePlayer();
          return;
        }
        
        if (data.type === 'telegram') {
          // Fallback: se não tem no bucket, avisa para abrir no bot
          alert('Este vídeo está disponível apenas no Telegram. Redirecionando...');
          tg.sendData(JSON.stringify({ action: 'request_video', series_id: serieId }));
          closePlayer();
          return;
        }
        
        // Configura o player
        video.src = data.url;
        video.load();
        
        loading.style.display = 'none';
        video.style.display = 'block';
        
        // Tenta autoplay
        video.play().catch(e => console.log('Autoplay bloqueado:', e));
        
        // Invalida URL após 30 min (recarrega a página se necessário)
        setTimeout(() => {
          if(overlay.classList.contains('active')) {
            alert('Sessão expirada. Recarregue para continuar assistindo.');
            closePlayer();
          }
        }, 1800000); // 30 min
        
      } catch (e) {
        console.error('Erro ao carregar vídeo:', e);
        alert('Erro ao carregar vídeo. Tente novamente.');
        closePlayer();
      }
    }

    function playHero() {
      const s = allSeries[currentHero];
      openPlayer(s.id, s.title);
    }

    function closePlayer() {
      const overlay = document.getElementById('playerOverlay');
      const video = document.getElementById('mainVideo');
      
      video.pause();
      video.src = ''; // Limpa a URL assinada
      overlay.classList.remove('active');
    }

    function scrollToGrid() {
      document.getElementById('grid-section').scrollIntoView({ behavior: 'smooth' });
    }

    function showDetails(id) {
      // Abre modal ou redireciona para compra
      const s = allSeries.find(x => x.id === id);
      if(confirm(`${s.title}\n\n${s.description || 'Sem descrição'}\n\nPreço: R$ ${s.price}\n\nDeseja adquirir?`)) {
        tg.sendData(JSON.stringify({ action: 'buy', series_id: id, title: s.title, price: s.price }));
        tg.close();
      }
    }

    // Fecha player com ESC
    document.addEventListener('keydown', (e) => {
      if(e.key === 'Escape') closePlayer();
    });

    // Previne menu de contexto (clique direito) no vídeo
    document.getElementById('mainVideo').addEventListener('contextmenu', (e) => {
      e.preventDefault();
      return false;
    });

    loadData();
  </script>
</body>
</html>

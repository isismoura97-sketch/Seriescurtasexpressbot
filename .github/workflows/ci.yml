name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint e validação
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check Node scripts
        shell: bash
        run: |
          set -euo pipefail
          for file in series-app/*.js scripts/*.mjs; do
            node --check "$file"
          done
          find series-app/api -type f -name '*.js' -exec node --check {} \;

      - name: Type-check Supabase function
        run: deno check supabase/functions/bot-unificado/index.ts

      - name: Test payment reconciliation
        run: deno test --allow-env supabase/functions/bot-unificado/index_test.ts

      - name: Test account session security
        run: node scripts/account-auth-check.mjs

  smoke:
    name: Smoke test do Mini App
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install Playwright
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            npm install --no-save playwright@1.61.0 && break
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep $((attempt * 5))
          done

      - name: Install browser dependencies
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            npx playwright install --with-deps chromium && break
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep $((attempt * 5))
          done

      - name: Run Mini App smoke check
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2; do
            node scripts/miniapp-functional-check.mjs && break
            if [ "$attempt" -eq 2 ]; then
              exit 1
            fi
            sleep 5
          done

  playback-audit:
    name: Auditoria de playback
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Run public playback audit
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            node scripts/playback-audit.mjs --json && break
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep $((attempt * 5))
          done

  linked-playback-audit:
    name: Auditoria completa do catálogo
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Run linked playback audit
        shell: bash
        run: |
          if [[ -z "${SUPABASE_URL:-}" || -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]]; then
            echo "Supabase secrets não configurados; pulando auditoria completa."
            exit 0
          fi

          set -euo pipefail
          for attempt in 1 2 3; do
            node scripts/playback-audit.mjs --service-role --json && break
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep $((attempt * 5))
          done
